# ============================================================
# Supreme Court of India
# D3LEM Entity v0.1.0 | data_quality: verified
# ============================================================

id: supreme_court_india
name: Supreme Court of India
name_hindi: भारत का उच्चतम न्यायालय
abbreviation: SC
aliases:
  - Apex Court
  - The Supreme Court

type: ConstitutionalCourt
cluster: constitutional_courts

level_of_government: Central
jurisdiction_scope:
  is_all_india: true
  jurisdiction_types:
    - Original       # Art. 131 — inter-state and centre-state disputes
    - Appellate      # Art. 132-136 — SLP and appeals
    - Writ           # Art. 32 — enforcement of fundamental rights
    - Advisory       # Art. 143 — President's reference

created_year: 1950
abolished_year: null
operational_status: Active

constitutional_basis: "Constitution of India, Articles 124–147"
statutory_basis: null

appointment:
  nominates: collegium_sc
  recommends: collegium_sc
  consulted: []
  consultation_binding: true
  formally_appoints: president_india
  criteria_public: false
  tenure: "Until age 65 (Article 124(2))"
  reappointment_possible: false
  removal_authority: parliament_both_houses
  removal_requires_parliament: true
  removal_independent_committee: true

funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_of_finance
  budget_figure_crore: null    # Populate from Union Budget Schedule
  budget_year: null

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: in_house_procedure_sc

complaint_mechanism:
  bias_complaint_to:
    - body: chief_justice_india
      mechanism: >
        In-House Procedure (SC Resolution 1999). Complaint to CJI.
        CJI constitutes 3-judge committee. Report is confidential.
        Complainant has no locus in inquiry proceedings.
      complainant_has_locus: false
      is_public_process: false
      timeframe_defined: false
      external_to_judiciary: false
  criminal_prosecution:
    requires_sanction_from: president_india
    consultation_required_with: chief_justice_india
    consultation_binding: true
  removal_mechanism: "Impeachment — Article 124(4). Motion by 100+ LS MPs or 50+ RS MPs. Never successfully completed in Indian history."
  lokpal_jurisdiction: "No"
  lokpal_jurisdiction_note: >
    Lokpal ruled in Jan 2025 that it cannot hear complaints against SC judges
    because the SC is established by Article 124 (Constitution), not an Act of
    Parliament. SC stayed Lokpal's attempt to assert jurisdiction over HC judges
    (suo moto, Feb 2025). Status: active litigation.
  source: "K. Veeraswami v Union of India (1991) 3 SCC 655; SC In-House Procedure 1999; SC Stay Order Feb 2025 (suo moto)"

training:
  trained_by: [national_judicial_academy]
  induction_training: false     # SC judges are not given induction training
  continuing_education: true
  training_mandatory: false

digital_infrastructure:
  system_used: [NJDG_SC, eCourts_Portal, SCI_Website]
  digital_variant: NIC_Standard
  integrated_with_njdg: true
  integration_notes: >
    NJDG-SC portal launched in 2023 as part of eCourts Phase III.
    SC data was the last to be integrated into national NJDG.

structural_variations: []

data_quality: verified
data_quality_notes: null

