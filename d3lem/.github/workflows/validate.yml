name: Validate D3LEM Data

on:
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate all YAML data files
        run: python scripts/validate.py --strict

      - name: Derive scores (dry run)
        run: python scripts/derive.py
