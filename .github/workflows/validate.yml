name: Validate JEM Data

on:
  pull_request:
    paths:
      - 'jem/data/**'
      - 'jem/scripts/**'
      - '.github/workflows/validate.yml'
  push:
    branches: [main, friedso_v1]
    paths:
      - 'jem/data/**'
      - 'jem/scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jem
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate all YAML data files
        run: python scripts/validate.py --strict

      - name: Derive scores (dry run)
        run: python scripts/derive.py

      - name: Validate graph relationship references
        run: python scripts/validate_graph_refs.py
