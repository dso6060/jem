name: Expert / institution review
description: Request structured review from a legal expert, think-tank, or official liaison (placeholder workflow)
title: "[expert-review] "
labels: ["expert-review", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        **For designated reviewers only** once onboarded in [`jem/docs/TEAM.md`](../../jem/docs/TEAM.md).
        Maintainers triage all submissions. This does not constitute legal advice or official endorsement.

  - type: input
    id: reviewer_org
    attributes:
      label: Organisation / affiliation
      placeholder: "[THINK_TANK_OR_INSTITUTION_NAME] — TBD"
    validations:
      required: false

  - type: input
    id: reviewer_contact
    attributes:
      label: Reviewer name or contact
      placeholder: "[LEGAL_EXPERT_OR_LIAISON_NAME] — TBD"
    validations:
      required: false

  - type: dropdown
    id: review_type
    attributes:
      label: Review type
      options:
        - Factual accuracy (single entity or field)
        - Methodology (scores / DATA_MODEL.md)
        - Cluster batch (e.g. all tax tribunals)
        - Policy / structural gap registry
        - Other
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope (entity IDs, files, or sections)
      placeholder: e.g. hc_allahabad, derive.py IR formula, README gap table row
    validations:
      required: true

  - type: textarea
    id: findings
    attributes:
      label: Findings or questions
      description: Attach links to primary sources where possible
    validations:
      required: true

  - type: dropdown
    id: recommendation
    attributes:
      label: Recommended action
      options:
        - Approve as-is
        - Correct in YAML (maintainer PR)
        - Mark contested — cite both positions
        - Defer — needs more research
        - Out of scope for JEM
    validations:
      required: false

  - type: checkboxes
    id: publication
    attributes:
      label: Attribution (optional)
      options:
        - label: OK to list organisation in TEAM.md as reviewer (no endorsement implied)
        - label: Anonymous review preferred
