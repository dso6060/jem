  # ══════════════════════════════════════════════════════════════════
  # Tax appellate chain (net-new edges only)
  # rel_cit_a_to_itat_appellate already exists
  # ══════════════════════════════════════════════════════════════════

  - id: rel_jcit_appeals_to_itat
    source: jcit_appeals_generic
    target: itat
    relationship_type: AppealableTo
    relationship_category: appellate_chain
    is_binding: true
    is_constitutional: false
    statutory_basis: >
      Income Tax Act 1961 s.253(1)(a) — appeal to ITAT from JCIT(A) order;
      Finance Act 2023 cadre confirmed appealable to ITAT.
    year_established: 2023
    data_quality: partial
    sources:
      - label: Income Tax Act 1961 s.253 — India Code
        url: https://www.india-code.nic.in/CodeofActs/1961/1961_43.pdf
        type: CentralAct
        accessed_date: '2026-06-12'

  - id: rel_drp_to_itat
    source: drp_income_tax
    target: itat
    relationship_type: AppealableTo
    relationship_category: appellate_chain
    is_binding: true
    is_constitutional: false
    statutory_basis: >
      Income Tax Act 1961 s.144C(12) — AO order conforming to DRP directions
      is appealable to ITAT under s.253.
    year_established: 2009
    data_quality: partial
    sources:
      - label: Income Tax Act 1961 s.144C — India Code
        url: https://www.india-code.nic.in/CodeofActs/1961/1961_43.pdf
        type: CentralAct
        accessed_date: '2026-06-12'


  - id: rel_aar_income_tax_to_high_courts_all
    source: aar_income_tax
    target: high_courts_all
    relationship_type: AppealableTo
    relationship_category: appellate_chain
    is_binding: false
    is_constitutional: true
    statutory_basis: >
      Income Tax Act 1961 s.245W — challenge to AAR ruling by writ petition
      under Article 226 to relevant High Court (no statutory appellate body).
    year_established: 1993
    notes: Writ jurisdiction; not a statutory appeal. Aggregate edge pending per-HC wiring.
    data_quality: partial
    sources:
      - label: Income Tax Act 1961 s.245W — India Code
        url: https://www.india-code.nic.in/CodeofActs/1961/1961_43.pdf
        type: CentralAct
        accessed_date: '2026-06-12'

  - id: rel_caar_customs_to_cestat
    source: caar_customs
    target: cestat
    relationship_type: AppealableTo
    relationship_category: appellate_chain
    is_binding: true
    is_constitutional: false
    statutory_basis: Customs Act 1962 s.28F — appeal from CAAR ruling lies to CESTAT
    year_established: 2021
    data_quality: partial
    sources:
      - label: Customs Act 1962 s.28F — India Code
        url: https://www.india-code.nic.in/CodeofActs/1962/1962_52.pdf
        type: CentralAct
        accessed_date: '2026-06-12'

