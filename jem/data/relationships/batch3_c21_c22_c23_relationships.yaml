relationships:

  # ── C21 Defence — Court Martial ───────────────────────────────────────────

  - id: rel_cm_aft_appeal
    source: court_martial_generic
    target: aft
    relationship_type: AppealableTo
    relationship_category: appellate_chain
    is_binding: true
    is_constitutional: false
    statutory_basis: "Army Act 1950, s.108–109; Navy Act 1957, s.179; Air Force Act 1950, s.107–108; Armed Forces Tribunal Act 2007, s.14"
    year_established: 2009
    notes: >
      General Court Martial (GCM), District Court Martial (DCM) and Summary
      General Court Martial (SGCM) orders are appealable to AFT. Summary Court
      Martial (SCM) orders are NOT appealable to AFT — only revision/habeas corpus
      routes apply (Union of India v. SPS Vains, 2008 — citation unverified).
    data_quality: partial
    sources:
      - label: "Armed Forces Tribunal Act 2007, s.14"
        url: https://india-code.nic.in/handle/123456789/2093
        type: CentralAct
        accessed_date: '2026-06-12'

  - id: rel_cm_mod_fund
    source: ministry_defence
    target: court_martial_generic
    relationship_type: PrimaryFunder
    relationship_category: funding
    is_binding: true
    is_constitutional: false
    statutory_basis: "Army Act 1950; Navy Act 1957; Air Force Act 1950 — court martial proceedings under service law"
    year_established: 1950
    notes: Court martial proceedings are conducted within the armed forces under MoD.
    data_quality: partial
    sources:
      - label: Ministry of Defence — Official Website
        url: https://mod.gov.in
        type: GoIWebsite
        accessed_date: '2026-06-12'

