  # ── EPFAT → ministry_labour_employment ────────────────────────────────────

  - id: rel_epfat_funded_by_mole
    source: epfat
    target: ministry_labour_employment
    relationship_type: PrimaryFunder
    relationship_category: funding
    is_binding: true
    is_constitutional: false
    statutory_basis: >
      Employees' Provident Funds and Miscellaneous Provisions Act, 1952, s. 7A
      (Appellate Tribunal); Finance Act 2017 amended EPF Act to route most EPF
      appeals to CGIT-cum-LCs. EPFAT funded via MoLE budget.
    year_established: 1952
    data_quality: partial
    notes: >
      Finance Act 2017 transferred most fresh EPF appeals to CGIT-cum-LCs under
      ID Act s. 7A. EPFAT continues to handle pending pre-2017 matters and specific
      categories. Verify with MoLE whether EPFAT remains constituted as of 2025
      or has been wound down; entity should be marked Abolished if dissolved.
    sources:
      - label: 'Employees Provident Funds and Miscellaneous Provisions Act 1952, s. 7A'
        url: https://india-code.nic.in/CodeofActs13/19520019.pdf
        type: CentralAct
        accessed_date: '2026-06-12'
      - label: 'CGIT official portal — Ministry of Labour and Employment'
        url: https://cgit.labour.gov.in/
        type: GoIWebsite
        accessed_date: '2026-06-12'

  - id: rel_epfat_policy_oversight_mole
    source: epfat
    target: ministry_labour_employment
    relationship_type: PolicyOversight
    relationship_category: supervisory
    is_binding: true
    is_constitutional: false
    statutory_basis: >
      EPF & MP Act 1952, s. 7A; EPFAT is constituted by the Central Government
      under MoLE administrative control.
    year_established: 1952
