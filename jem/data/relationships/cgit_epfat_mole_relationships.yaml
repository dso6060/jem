  - id: rel_epfo_funded_by_mole
    source: epfo
    target: ministry_labour_employment
    relationship_type: PrimaryFunder
    relationship_category: funding
    is_binding: true
    is_constitutional: false
    statutory_basis: >
      EPF & MP Act 1952; EPFO administrative expenses funded via Consolidated Fund
      of India through MoLE budget; corpus is member-contribution-funded separately.
    year_established: 1952
    data_quality: partial
    notes: >
      EPFO's administrative budget flows through MoLE; the provident fund corpus
      itself is held in trust and is not GoI budget. This edge covers the
      administrative/operational funding relationship only.
    sources:
      - label: 'EPF & MP Act 1952'
        url: https://india-code.nic.in/CodeofActs13/19520019.pdf
        type: CentralAct
        accessed_date: '2026-06-12'
