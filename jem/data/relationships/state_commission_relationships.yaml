  # ── NHRC → Supreme Court (PHRA 1993 s.18) ──────────────────────────────────
  # AppealableTo: closest available type; court-access pathway, not standard appeal.

  - id: rel_nhrc_sc_court_access
    source: nhrc
    target: supreme_court_india
    relationship_type: AppealableTo
    relationship_category: appellate_chain
    is_binding: false
    is_constitutional: false
    statutory_basis: "Protection of Human Rights Act 1993, s.18"
    year_established: 1993
    notes: >
      PHRA 1993 s.18: NHRC may approach the Supreme Court or High Court to present
      submissions in ongoing proceedings involving human rights allegations, or
      recommend transfer of court proceedings. Not a conventional inter-party
      statutory appeal; is_binding false reflects advisory nature of NHRC findings.
    data_quality: partial
    contested_note: >
      Court-access / submissions pathway, not a standard appellate step.
    sources:
      - label: "Protection of Human Rights Act 1993, s.18"
        url: https://nhrc.nic.in/sites/default/files/PHRA.pdf
        type: CentralAct
        accessed_date: "2026-05-18"
