relationships:

  # ── Consumer commission appellate chain (CPA 2019 s.51) ────────────────────

  - id: rel_mh_scdrc_ncdrc_appellate
    source: mh_scdrc
    target: ncdrc
    relationship_type: AppealableTo
    relationship_category: appellate_chain
    is_binding: true
    is_constitutional: false
    statutory_basis: "Consumer Protection Act 2019, s.51"
    year_established: 2019
    notes: >
      Any person aggrieved by an order of the SCDRC in exercise of its
      pecuniary jurisdiction may appeal to the NCDRC. Limitation: 30 days
      from date of order (CPA 2019 s.51(2)), condonable for sufficient cause.
    data_quality: verified
    sources:
      - label: "Consumer Protection Act 2019, s.51"
        url: https://consumeraffairs.nic.in/acts-and-rules/consumer-protection-act-2019
        type: CentralAct
        accessed_date: "2026-05-18"

