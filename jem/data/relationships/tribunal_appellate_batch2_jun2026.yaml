  - id: rel_gst_commr_appeals_to_gstat
    source: gst_commissioner_appeals_generic
    target: gstat
    relationship_type: AppealableTo
    relationship_category: appellate_chain
    is_binding: true
    is_constitutional: false
    statutory_basis: >-
      Central Goods and Services Tax Act 2017, s.109 — appeal to Appellate
      Tribunal from order of Appellate Authority (Commissioner Appeals under
      s.107) or Revisional Authority (s.108); s.112 is the further appeal to
      High Court on substantial questions of law
    year_established: 2017
    notes: >-
      First appellate tier under CGST is Commissioner (Appeals) s.107; GSTAT is
      second appellate forum. Adjudicating Authority → Commr(A) → GSTAT chain.
    data_quality: partial
    sources:
      - label: CGST Act 2017 — ss.107, 112 (India Code)
        url: https://india-code.nic.in/
        type: CentralAct
        accessed_date: '2026-06-26'

