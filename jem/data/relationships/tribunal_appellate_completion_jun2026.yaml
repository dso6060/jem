    relationship_category: appellate_chain
    is_binding: true
    is_constitutional: false
    statutory_basis: Employees' Provident Funds and Miscellaneous Provisions Act 1952, s.7I — appeal to High Court within 60 days from Tribunal order
    year_established: 1952
    notes: EPFAT single bench at New Delhi; competent HC is Delhi High Court.
    data_quality: partial
    sources:
