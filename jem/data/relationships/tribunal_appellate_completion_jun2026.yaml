        url: https://india-code.nic.in/DownloadFile?FileName=A1952-19.pdf
        type: CentralAct
        accessed_date: '2026-06-26'

  # ══════════════════════════════════════════════════════════════════
  # NGT — environmental appellate authorities → NGT → SC
  # ══════════════════════════════════════════════════════════════════

  - id: rel_env_appellate_auth_to_ngt
