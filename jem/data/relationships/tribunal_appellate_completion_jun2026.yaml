    relationship_category: appellate_chain
    is_binding: true
    is_constitutional: false
    statutory_basis: National Green Tribunal Act 2010, s.16 — appeal to NGT against orders of appellate authorities under listed environmental Acts
    year_established: 2010
    notes: >-
      Rollup upstream for Water Act, Air Act, EPA, FCA, Biodiversity Act and
      other s.16-listed statutes. NGT original jurisdiction under s.14 is
      separate and not represented by this edge.
    data_quality: partial
    sources:
