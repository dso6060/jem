    relationship_category: appellate_chain
    is_binding: true
    is_constitutional: false
    statutory_basis: >-
      Employees' Provident Funds and Miscellaneous Provisions Act 1952, s.7D —
      Tribunal constituted to hear appeals against orders under ss.7A, 7B, 14B
    year_established: 1952
    notes: EPFO enquiry officers pass adjudicatory orders; EPFAT is the statutory first appeal forum.
    data_quality: partial
    sources:
      - label: EPF Act 1952 — ss.7A–7D (India Code)
        url: https://india-code.nic.in/DownloadFile?FileName=A1952-19.pdf
        type: CentralAct
        accessed_date: '2026-06-26'

  - id: rel_epfat_to_hc_delhi
