# Tribunal appellate chain completion — Jun 2026
# Verified statutory citations only; partial data_quality where writ-only or generic upstream.
# Pipeline: validate.py → validate_graph_refs.py → derive.py → build.py

relationships:

  # ══════════════════════════════════════════════════════════════════
  # FEMA / ATFE chain
  # ══════════════════════════════════════════════════════════════════

  - id: rel_fema_aa_to_atfe
    source: fema_adjudicating_authority_generic
    target: atfe
    relationship_type: AppealableTo
    relationship_category: appellate_chain
    is_binding: true
    is_constitutional: false
    statutory_basis: Foreign Exchange Management Act 1999, s.17 — appeal to Appellate Tribunal against order of adjudicating authority appointed under s.16
    year_established: 2000
    notes: >-
      Officers designated under FEMA s.16 (typically ED officers in adjudicating
      capacity). Distinct from ED investigation function.
    data_quality: partial
    sources:
      - &india_code
        label: India Code — Constitution & Acts
        url: https://india-code.nic.in/
        type: GoIWebsite
        accessed_date: '2026-06-26'

  - id: rel_atfe_to_hc_delhi
    source: atfe
    target: hc_delhi
    relationship_type: AppealableTo
    relationship_category: appellate_chain
    is_binding: true
    is_constitutional: false
    statutory_basis: Foreign Exchange Management Act 1999, s.19 — appeal to High Court on substantial question of law arising from Appellate Tribunal order
    year_established: 2000
    notes: >-
      ATFE principal seat at New Delhi. Competent HC for principal-bench orders
      is Delhi High Court; other benches (if constituted) would map to respective HCs.
    data_quality: partial
    sources:
      - *india_code

  # ══════════════════════════════════════════════════════════════════
  # Electricity — APTEL terminal appeal (SERC/CERC → APTEL already wired)
  # ══════════════════════════════════════════════════════════════════

  - id: rel_aptel_to_sc
    source: aptel
    target: supreme_court_india
    relationship_type: AppealableTo
    relationship_category: appellate_chain
    is_binding: true
    is_constitutional: false
    statutory_basis: Electricity Act 2003, s.125(3) — appeal to Supreme Court on question of law from Appellate Tribunal order
    year_established: 2005
    notes: >-
      Terminal statutory appellate tier for electricity regulatory chain:
      SERC/CERC orders → APTEL (ss.111, 125) → SC (s.125(3)). Factual findings
      of APTEL are final; SC review limited to questions of law.
    data_quality: verified
    sources:
      - label: Electricity Act 2003 — s.125 (India Code)
        url: https://india-code.nic.in/acts-detail/MTQ3MA==
        type: CentralAct
        accessed_date: '2026-06-26'

  # ══════════════════════════════════════════════════════════════════
  # EPF — EPFO adjudicatory orders → EPFAT → HC
