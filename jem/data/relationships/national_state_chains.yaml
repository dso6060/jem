  source: hc_madras_bench_madurai
  target: hc_madras
  relationship_type: BenchOf
  relationship_category: statutory_ref
  is_binding: true
  notes: >
    Madurai Bench is the sole permanent bench of the Madras High Court (est.
    2004). No permanent bench exists at Tiruchirappalli. Exercises full HC
    jurisdiction for 10 southern TN districts per hc_benches_config.py
    TN_DISTRICT_TO_BENCH: Dindigul, Kanniyakumari, Madurai, Ramanathapuram,
    Sivaganga, Tenkasi, Thoothukudi, Theni, Tirunelveli, Virudhunagar.
    Central/northern TN districts appeal to hc_madras principal seat.
