id: pfrda
name: Pension Fund Regulatory and Development Authority
name_hindi: पेंशन निधि विनियामक और विकास प्राधिकरण
abbreviation: PFRDA
aliases:
  - Pension Fund Regulatory and Development Authority of India

type: RegulatoryBodyQJ
cluster: regulatory_bodies
level_of_government: Central

jurisdiction_scope:
  is_all_india: true
  jurisdiction_types:
    - pension_regulation
    - national_pension_system
    - pension_fund_oversight
    - subscriber_protection

created_year: 2003
operational_status: Active

constitutional_basis: null
statutory_basis: >-
  Pension Fund Regulatory and Development Authority Act 2013 (Act 23
  of 2013), s.3 (establishment). Originally constituted by GoI
  resolution in 2003; given statutory status by PFRDA Act 2013.
  Regulates the National Pension System (NPS) for government and
  private sector subscribers.

