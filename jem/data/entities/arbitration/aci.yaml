data_quality: verified
data_quality_notes: >
  ACI's non-constitution is confirmed by GoI press release (Feb 2026) and
  SC notice to Union government to respond to petition seeking its establishment.
  The Draft Arbitration and Conciliation (Amendment) Bill 2024 proposes revised
  powers. Status as of April 2025: Bill in public consultation; ACI not constituted.

structural_variations:
  - variation_id: aci_2024_bill_revision
    description: >
      Draft Arbitration Bill 2024 proposes to replace ACI's grading power
      with recognition of arbitral institutions and model rules. This would
      change the composition and functions defined in the 2019 Act if passed.
    applicable_to: ["all"]
    source: "Draft Arbitration and Conciliation (Amendment) Bill 2024 — Ministry of Law & Justice"
    independence_risk_note: >
      ACI Chairperson appointed by Central Government in consultation with CJI.
      CJI consultation is binding. However, Government retains formal appointment power.

