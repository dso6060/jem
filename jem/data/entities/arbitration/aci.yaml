data_quality_notes: 'ACI not constituted as of June 2026 — ~7 years since 2019 amendment legislation. SC issued notice to Union government 23 January 2025 to explain prolonged delay. GoI press release (Feb 2026) confirms non-constitution. Draft Arbitration and Conciliation (Amendment) Bill 2024 proposes revised powers; Bill in public consultation.'
