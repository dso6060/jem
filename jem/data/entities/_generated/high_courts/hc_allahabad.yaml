  gaps:
  - gap_id: hc_allahabad_judge_vacancy
    gap_type: Appointment_Gap
    gap_severity: Critical
    gap_description: >-
      ~50% judicial vacancy — 80 of 160 posts unfilled (working strength
      ~80 judges) as of July 2025 snapshot. India's highest-volume High Court.
    gap_source: DoJ judicial vacancy report / HC roster (Jul 2025)
    gap_since_year: null
    gap_status: Open
    gap_resolution_note: >-
      Vacancies filled via collegium recommendations and Presidential warrants;
      no statutory timeline for vacancy fill. Monitor DoJ judicial vacancy
      reports and HC roster at doj.gov.in.
    gap_spillover:
    - affected_body: hc_allahabad
      spillover_type: appellate_backlog
      metric_note: >-
        ~1.1 million pending cases (NJDG snapshot Dec 2024) with ~50% judicial
        vacancy (80 of 160 posts, Jul 2025 DoJ) — India's highest-volume HC;
        unfilled posts correlate with prolonged disposal times (avg ~1,460 days).
      source_url: https://njdg.ecourts.gov.in/
      source_label: NJDG snapshot + DoJ vacancy report 1 Aug 2025
      data_as_of: '2025-08-01'
      spillover_data_quality: partial
data_quality: partial
data_quality_notes: Pending NJDG-backed pendency and judge_strength fields per bench. NJDG snapshot case_volume merged complaint_mechanism populated from SC In-House Procedure 1999 and SC Stay Order Feb 2025 (suo moto). criminal_prosecution.requires_sanction_from set to governor_state per Veeraswami (1991) for HC judges. lokpal_jurisdiction No per operative Feb 2025 stay; revisit if SC decides finally. audit.conduct_oversight_body set to in_house_procedure_sc (same procedure governs HC judges).
