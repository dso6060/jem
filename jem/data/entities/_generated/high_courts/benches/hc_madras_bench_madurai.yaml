    Madurai Bench at snapshot date.
    Appointed count (18) derived from the official Madurai Bench display board
    snapshot showing judges listed across courts (daily board); excludes names.

data_quality: verified
data_quality_notes: >-
  Stub year 1948 referred to pre-independence circuit sittings — corrected
  to 2004 (permanent bench). Presidential Order notified 06 Jul 2004;
  bench operational from 24 Jul 2004. allotted null by design (parent HC pool).
  complaint_mechanism populated from SC In-House Procedure 1999 and SC Stay Order Feb 2025 (suo moto). criminal_prosecution.requires_sanction_from set to governor_state per Veeraswami (1991) for HC judges. lokpal_jurisdiction No per operative Feb 2025 stay; revisit if SC decides finally. audit.conduct_oversight_body set to in_house_procedure_sc (same procedure governs HC judges).

