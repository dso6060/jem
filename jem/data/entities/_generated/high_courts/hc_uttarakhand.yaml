id: hc_uttarakhand
name: High Court of Uttarakhand
abbreviation: UTTA
type: ConstitutionalCourt
cluster: constitutional_courts
level_of_government: State
jurisdiction_scope:
  states_covered:
  - UK
  uts_covered: []
  is_all_india: false
  jurisdiction_types:
  - Original
  - Appellate
  - Writ
created_year: 2000
operational_status: Active
constitutional_basis: Constitution of India, Chapter VI — High Courts in the States
statutory_basis: null
appointment:
  nominates: collegium_hc_appointment
  recommends: collegium_hc_appointment
  consulted:
  - governor_state
  consultation_binding: true
  formally_appoints: president_india
  criteria_public: false
  tenure: Until age 62 (Article 217)
  reappointment_possible: false
  removal_authority: president_india
  removal_requires_parliament: true
  removal_independent_committee: false
funding:
  primary_source: State_Consolidated_Fund
  ministry_responsible: null
  budget_figure_crore: null
  budget_year: null
audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: in_house_procedure_sc
complaint_mechanism:
  bias_complaint_to:
    - body: chief_justice_india
      mechanism: >-
        In-House Procedure (SC Resolution 1999, extended to HC judges). Complaint
        lodged with the Chief Justice of the concerned High Court; if the allegation
        is against that Chief Justice, complaint filed directly with the CJI. CJI
        may constitute a 3-judge in-house committee to inquire. Report is
        confidential. Complainant has no locus in inquiry proceedings.
      complainant_has_locus: false
      is_public_process: false
      timeframe_defined: false
      external_to_judiciary: false
  criminal_prosecution:
    requires_sanction_from: governor_state
    consultation_required_with: chief_justice_india
    consultation_binding: true
  removal_mechanism: >-
    Address by Parliament — Article 217(1)(b) read with Article 124(4).
    Motion by 100+ LS MPs or 50+ RS MPs. No HC judge has been successfully
    removed in Indian history.
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: >-
    SC stayed Lokpal's attempt to assert jurisdiction over HC judges (suo moto,
    Feb 2025). Lokpal had separately ruled in Jan 2025 that it cannot hear
    complaints against SC judges (Art 124 basis); the Feb 2025 stay extends
    the same bar to HC judges. Status: active litigation, but operative bar
    currently in place.
  source: >-
    K. Veeraswami v Union of India (1991) 3 SCC 655; SC In-House Procedure
    1999; SC Stay Order Feb 2025 (suo moto re HC judges)
training:
