data_quality_notes: >
  DERC constituted November 2001 under the Delhi Electricity Reform Act 2000;
  continued under Electricity Act 2003 s.82. level_of_government is UT — Delhi
  is NCT with a legislature. AppealableTo aptel per Electricity Act 2003 s.111
  — in dl_relationships.yaml (id: dl_derc_aptel). case_volume from NJDG
  snapshot; verify against DERC annual reports at derc.gov.in.

