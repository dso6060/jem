data_quality_notes: >
  MERC constituted August 1999 under Maharashtra Electricity Regulatory
  Commission Act 1999 (Maharashtra Act 29 of 1999); continued under
  Electricity Act 2003 s.82. ministry_responsible is null — Maharashtra
  Energy Department is the administrative department but carries no JEM
  entity ID. AppealableTo aptel per Electricity Act 2003 s.111 — in
  mh_relationships.yaml (id: mh_merc_aptel). judge_strength omitted —
  ERC members are technical/economic experts, not judges.

