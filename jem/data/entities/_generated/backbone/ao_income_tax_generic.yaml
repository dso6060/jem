id: ao_income_tax_generic
name: Assessing Officer (Income Tax) — Generic
name_hindi: आयकर निर्धारण अधिकारी — सामान्य
abbreviation: AO (IT)
aliases:
- Income Tax Officer
- ITO
- Deputy Commissioner of Income Tax (Assessment)
- DCIT (Assessment)
type: ExecutiveBody
cluster: executive_interface
level_of_government: Central
created_year: 1961
operational_status: Active
constitutional_basis: null
statutory_basis: >
  Income Tax Act 1961 s.2(7A) (definition of Assessing Officer); ss.120–133C
  (jurisdiction, powers, and functions of income-tax authorities including AOs);
  ss.143–144 (assessment procedure); ss.147–148A (reassessment); s.156 (demand
  notice). Faceless Assessment Scheme under s.144B (CBDT Notification 60/2020) —
  assessment largely performed through National Faceless Assessment Centre (NFAC).
  Appeals against AO orders lie to CIT(A)/JCIT(A) under s.246A, thence to ITAT
  under s.253.
