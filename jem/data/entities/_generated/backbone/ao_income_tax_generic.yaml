data_quality_notes: >-
  Generic entity representing the Assessing Officer cadre across all Income Tax field formations. AO is the originating authority in the IT appellate chain: AO → CIT(A) → ITAT → HC → SC.

  This entity models the structural role, not any individual AO or charge/ward. Actual formations are allocated by CBDT through charge orders; individual AO jurisdictions assigned under IT Act 1961 s.120 via CBDT notification.

  No judge_strength or case_volume fields applicable — volume statistics are reported at CBDT/department level, not per AO unit.
