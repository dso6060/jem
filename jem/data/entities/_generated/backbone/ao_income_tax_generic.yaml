structural_variations:
  - variation_id: ao_faceless_assessment
    description: >
      Faceless Assessment Scheme launched under s.144B of the IT Act, notified vide
      CBDT Notification No. 60/2020 and subsequent notifications. Cases assigned to
      National Faceless Assessment Centre (NFAC), Delhi and Regional Faceless
      Assessment Centres; assessment completed without face-to-face interaction.
      Certain categories (international tax, search/seizure, black money) excluded
      from faceless scheme.
    applicable_to:
      - ao_income_tax_generic
    source: IT Act 1961 s.144B; CBDT Notification 60/2020 dated 13 August 2020
    independence_risk_note: >
      Faceless scheme reduces opportunity for AO-taxpayer corruption but raises
      concerns about due process; multiple HC petitions filed 2020-2023.
data_quality: partial
data_quality_notes: >-
  Generic entity representing the Assessing Officer cadre across all Income Tax field formations. AO is the originating authority in the IT appellate chain: AO → CIT(A) → ITAT → HC → SC.

  This entity models the structural role, not any individual AO or charge/ward. Actual formations are allocated by CBDT through charge orders; individual AO jurisdictions assigned under IT Act 1961 s.120 via CBDT notification.

  No judge_strength or case_volume fields applicable — volume statistics are reported at CBDT/department level, not per AO unit.
