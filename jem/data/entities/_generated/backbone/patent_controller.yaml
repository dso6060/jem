data_quality: partial
data_quality_notes: >
  created_year: 1912 — Patent Office established under Patents & Designs Act 1911
  (institutional continuity; head office Mumbai). Current statutory basis is Patents
  Act 1970 (§ 3 — Controller General); use 1970 only if modelling the current Act
  regime rather than office lineage. statutory_basis field reflects the 1970 Act.
  Appellate path post-IPAB abolition (2021):
    — Patent pre-grant/post-grant opposition: Controller → writ/appeal to HC (original side)
    — Patent revocation (§ 64): HC or Counter-claim in infringement suit
    — Trade mark rectification / appeal against Registrar: High Court (post-IPAB, § 91)
    — Design appeal: HC
  CGPDTM office is in Mumbai (Head Office); branch offices in Delhi, Kolkata, Chennai.
  Quasi-judicial function: Controllers (Deputy/Assistant Controllers under CGPDTM)
  hear patent opposition proceedings — this is a quasi-judicial function. They are
  subordinate officers of the patent office, not tribunal members.
  case_volume: IP India Annual Report 2022-23 publishes application and disposal
  data but not in NJDG pendency format. Deferred to Phase-2.

