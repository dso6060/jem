id: drt
name: Debt Recovery Tribunal
name_hindi: ऋण वसूली अधिकरण
abbreviation: DRT
aliases:
- Debts Recovery Tribunal
type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central
jurisdiction_scope:
  is_all_india: true
  jurisdiction_types:
  - debt_recovery
  - bank_claims
  - sarfaesi_proceedings
created_year: 1993
operational_status: Active
constitutional_basis: null
statutory_basis: Recovery of Debts Due to Banks and Financial Institutions Act 1993 (RDDBFI Act), s.3–8; Securitisation and
  Reconstruction of Financial Assets and Enforcement of Security Interest Act 2002 (SARFAESI Act), s.17 — borrower/guarantor
  applications against secured creditors. Modelled as a single central entity; physically operates as 39 benches across India.
appointment:
  nominates: ministry_of_finance
  recommends: null
  consulted: []
  consultation_binding: null
  formally_appoints: central_government
  criteria_public: true
  tenure: 'Presiding Officers: 5 years or age 62, whichever is earlier'
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false
  removal_independent_committee: false
funding:
  primary_source: Ministry_Budget
  ministry_responsible: ministry_of_finance
audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: ministry_of_finance
complaint_mechanism:
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: Presiding Officers treated as judicial officers; Lokpal Act 2013 excludes judicial officers per
    Schedule exclusion.
  removal_mechanism: Removal by Central Government on grounds of proved misbehaviour or incapacity after inquiry (RDDBFI Act
    1993, s.7)
