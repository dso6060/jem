id: drt_jaipur
name: Debt Recovery Tribunal, Jaipur
name_hindi: ऋण वसूली अधिकरण, जयपुर
abbreviation: DRT Jaipur
aliases:
- Debts Recovery Tribunal Jaipur
type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central
jurisdiction_scope:
  states_covered:
  - RJ
  is_all_india: false
  jurisdiction_types:
  - debt_recovery
  - sarfaesi_appeals
created_year: 1994
operational_status: Active
statutory_basis: 'Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act), s. 3; SARFAESI Act, 2002,
  s. 17. Notified vide G.S.R. 655(E) dated 30 August 1994. Current address and jurisdiction per S.O. 4718(E) dated 4 October
  2022: 1st Floor, Sudhakarma-II, Lal Kothi Shopping Centre, Tonk Road, Jaipur — jurisdiction: entire State of Rajasthan for
  amounts below ₹100 crore; amounts of ₹100 crore and above are handled by DRT No. 3, Delhi. Single-bench tribunal under DRAT
  Delhi.

  '
appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: 5 years or until age 62, whichever is earlier
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false
funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_of_finance
audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: hc_rajasthan
complaint_mechanism:
  bias_complaint_to:
  - body: hc_rajasthan
    mechanism: 'Supervisory jurisdiction of Rajasthan High Court under Arts 226/227; writ petition before Rajasthan High Court.

      '
    complainant_has_locus: true
    is_public_process: true
    external_to_judiciary: false
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: 'Presiding Officer is a judicial officer equivalent to District Judge.

    '
  source: RDDBFI Act 1993; Constitution of India Arts 226-227
data_quality: partial
data_quality_notes: 'GSR G.S.R. 655(E) dated 30 August 1994 establishes DRT Jaipur. Official address and jurisdiction table
  from S.O. 4718(E) dated 4 October 2022 (ibclaw.in). Jurisdiction: State of Rajasthan for debt below ₹100 crore; above ₹100
  crore transferred to DRT-3 Delhi per 2022 notification. v1.2 judge_strength stub attached'
