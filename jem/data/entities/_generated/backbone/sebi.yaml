  source_type: AnnualReport
  source_url: null
  notes: Regulatory body; Member strength determined by SEBI Act schedule.

data_quality: partial
data_quality_notes: >-
  SEBI primarily funds itself via fees and levies (Statutory_Fund) under
  SEBI Act 1992, s.14; MoF oversight retained for member appointments and
  appeals. Appeals from SEBI orders go to SAT (Securities Appellate
  Tribunal — existing entity in graph). Relationship edge recorded in
  relationships file.

