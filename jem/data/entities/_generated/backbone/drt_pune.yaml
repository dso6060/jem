id: drt_pune
name: Debt Recovery Tribunal, Pune
name_hindi: ऋण वसूली अधिकरण, पुणे
abbreviation: DRT Pune
aliases:
- Debts Recovery Tribunal Pune
type: CentralTribunal
cluster: tribunals_adr
