jurisdiction_scope:
  states_covered:
  - MH
  is_all_india: false
  jurisdiction_types:
  - debt_recovery
  - sarfaesi_appeals
created_year: 1994
operational_status: Active
statutory_basis: 'Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act), s. 3; SARFAESI Act, 2002,
  s. 17. DRT Pune is a single-bench tribunal under DRAT Mumbai appellate supervision. Territorial jurisdiction notified by
  Central Government; covers Pune division and surrounding Maharashtra districts not served by DRT Mumbai, DRT Nagpur, or
  DRT Aurangabad.

  '
appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: 5 years or until age 62, whichever is earlier
  reappointment_possible: false
