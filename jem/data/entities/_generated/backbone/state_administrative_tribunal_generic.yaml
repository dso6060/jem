id: state_administrative_tribunal_generic
name: State Administrative Tribunal — Generic (Non-CAT)
name_hindi: राज्य प्रशासनिक अधिकरण — सामान्य
abbreviation: State AT

type: StateTribunal
cluster: tribunals_adr
level_of_government: State

created_year: 1985
operational_status: Active

constitutional_basis: >
  Constitution of India Article 323-B empowers Parliament and State Legislatures
  to establish tribunals for service-condition disputes.
statutory_basis: >
  Administrative Tribunals Act 1985 s.4(2); few states (Maharashtra, Karnataka,
  Himachal Pradesh, Odisha, Tamil Nadu historically) have operated State ATs;
  most state employees use CAT or High Court directly.

