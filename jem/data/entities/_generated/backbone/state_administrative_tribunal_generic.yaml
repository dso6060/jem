data_quality_notes: >
  Generic scaffold distinct from CAT (central). Trend since L. Chandra Kumar (1997)
  is direct HC jurisdiction for many matters. Do not conflate with CAT or HC service
  benches. Appeal from State AT typically lies to High Court.

