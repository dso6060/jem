id: drt_dehradun
name: Debt Recovery Tribunal, Dehradun
name_hindi: ऋण वसूली अधिकरण, देहरादून
abbreviation: DRT Dehradun
aliases:
  - Debts Recovery Tribunal Dehradun

type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central

jurisdiction_scope:
  states_covered:
    - UK
    - UP
  is_all_india: false
  jurisdiction_types:
    - debt_recovery
    - sarfaesi_appeals

created_year: 2017
operational_status: Active

statutory_basis: >
  Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act),
  s. 3; SARFAESI Act, 2002, s. 17. Established vide S.O. 454(E) dated 15 February
  2017, effective 16 February 2017, which created DRT Dehradun and superseded
  G.S.R. 274(E) dated 31 March 2000 and G.S.R. 71(E) dated 31 January 2002.
  Official address: Paras Tower, 2nd Floor, Majra Niranjanpur, Saharanpur Road,
  Dehradun. Jurisdiction: entire State of Uttarakhand, plus Amroha, Bijnor,
  Moradabad, Rampur, Sambhal, Muzaffarnagar, Saharanpur, and Shamli districts of
  Uttar Pradesh. Single-bench tribunal under DRAT Allahabad.

appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: '5 years or until age 62, whichever is earlier'
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false

funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_of_finance

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: hc_uttarakhand

complaint_mechanism:
  bias_complaint_to:
    - body: hc_uttarakhand
      mechanism: >
        Supervisory jurisdiction of Uttarakhand High Court under Arts 226/227; writ
        petition before Uttarakhand High Court at Nainital. For UP districts in the
        Dehradun DRT catchment, supervisory jurisdiction may lie with Allahabad HC
        principal bench — not definitively resolved; left partial.
      complainant_has_locus: true
      is_public_process: true
      external_to_judiciary: false
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: >
    Presiding Officer is a judicial officer equivalent to District Judge.
  source: RDDBFI Act 1993; Constitution of India Arts 226-227

data_quality: partial
data_quality_notes: >
  DISTRICT TABLE UPGRADED. Authoritative jurisdiction per S.O. 454(E) dated 15
  February 2017 (ibclaw.in full text retrieved 2026-06-12): Uttarakhand (entire state)
  plus UP districts of Amroha, Bijnor, Moradabad, Rampur, Sambhal, Muzaffarnagar,
  Saharanpur, and Shamli. Address: Paras Tower, 2nd Floor, Majra Niranjanpur,
  Saharanpur Road, Dehradun. Note that DRT Dehradun's jurisdiction includes western
  UP Saharanpur-Moradabad districts — not merely Uttarakhand. HC supervisory
  jurisdiction for UP districts is left partial.

unverified_fields:
  - field: complaint_mechanism.bias_complaint_to
    note: >
      Supervisory HC for western UP districts in Dehradun DRT catchment (Allahabad
      vs Uttarakhand HC) not definitively resolved.

