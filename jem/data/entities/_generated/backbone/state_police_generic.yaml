  - gap_id: state_police_no_statutory_hc_judge_security
    gap_type: Security_Gap
    gap_severity: Critical
    gap_description: >-
      No explicit statutory duty on state police forces to provide security to
      High Court judges independent of executive notification or specific court
      order — security provisioning is an executive function without a binding
      all-India obligation.
    gap_source: State Police Acts (generic); JEM gap registry review Jun 2026
    gap_since_year: 1950
    gap_status: Open
    gap_resolution_note: >-
      No all-India statutory mandate for HC judge security in State Police Acts;
      provisioning remains via state executive orders and High Court administrative
      directions — closing requires state legislation or uniform central protocol.
