id: drt_ranchi
name: Debt Recovery Tribunal, Ranchi
name_hindi: ऋण वसूली अधिकरण, रांची
abbreviation: DRT Ranchi
aliases:
  - Debts Recovery Tribunal Ranchi

type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central

jurisdiction_scope:
  states_covered:
    - JH
  is_all_india: false
  jurisdiction_types:
    - debt_recovery
    - sarfaesi_appeals

created_year: 2002
operational_status: Active

statutory_basis: >
  Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act),
  s. 3; SARFAESI Act, 2002, s. 17. Notified vide G.S.R. 113(E) dated 26 February 2002,
  established following the creation of Jharkhand state (2000) to serve the new state
  separately from DRT Patna. Single-bench tribunal under DRAT Allahabad.
  Jurisdiction: State of Jharkhand.

appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: '5 years or until age 62, whichever is earlier'
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false

funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_of_finance

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: hc_jharkhand

complaint_mechanism:
  bias_complaint_to:
    - body: hc_jharkhand
      mechanism: >
        Supervisory jurisdiction of Jharkhand High Court under Arts 226/227;
        writ petition before Jharkhand High Court.
      complainant_has_locus: true
      is_public_process: true
      external_to_judiciary: false
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: >
    Presiding Officer is a judicial officer equivalent to District Judge.
  source: RDDBFI Act 1993; Constitution of India Arts 226-227

data_quality: partial
data_quality_notes: >
  G.S.R. 113(E) dated 26 February 2002 establishes DRT Ranchi; jurisdiction:
  State of Jharkhand. DRAT Allahabad supervision confirmed across jabalpuradvocate.com
  and TaxTMI.

sources:
  - label: 'RDDBFI Act 1993 (Recovery of Debts and Bankruptcy Act)'
    url: https://india-code.nic.in/CodeofActs13/19930951.pdf
    type: CentralAct
    accessed_date: '2026-06-12'
  - label: 'DRT Ranchi — GSR 113(E) 26.2.2002; jurisdiction: Jharkhand'
    url: https://bankauctions.in/asset-recovery/debt-recovery-tribunal/
    type: OfficialReport
    accessed_date: '2026-06-12'
  - label: 'DRT official portal — Ministry of Finance, DFS'
    url: https://drt.gov.in/
    type: GoIWebsite
    accessed_date: '2026-06-12'
