id: drat_kolkata
name: Debt Recovery Appellate Tribunal, Kolkata
name_hindi: ऋण वसूली अपीलीय अधिकरण, कोलकाता
abbreviation: DRAT Kolkata
aliases:
- Debts Recovery Appellate Tribunal Kolkata
type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central
jurisdiction_scope:
  states_covered:
  - WB
  - TS
  - AP
  - OD
  - AS
  - SK
  is_all_india: false
  jurisdiction_types:
  - appellate
  - debt_recovery_appeals
created_year: 2000
operational_status: Active
statutory_basis: >-
  Recovery of Debts Due to Banks and Financial Institutions Act 1993 (RDDBFI Act),
  s.8 — established vide G.S.R. 257(E), 24 March 2000. Appellate circuit for
  DRT-1/2 Hyderabad and DRT Visakhapatnam confirmed by G.S.R. 538(E) dated
  8 June 2018 (DRAT Kolkata Recruitment Rules First Schedule) and G.S.R. 429(E)
  (June 2021 amendment). These DRTs were originally in the DRAT Chennai circuit
  under G.S.R. 134(E), 17 February 2000, before transfer to DRAT Kolkata.
appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: 'Chairperson: 5 years or age 65, whichever is earlier'
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false
funding:
  primary_source: Ministry_Budget
  ministry_responsible: ministry_of_finance
audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: hc_calcutta
complaint_mechanism:
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: Judicial officers; Lokpal Act 2013 excludes.
data_quality: partial
data_quality_notes: >-
  Bench-level DRAT entity (C04). Supervises DRT Kolkata 1–3, DRT Hyderabad 1–2,
  DRT Visakhapatnam, DRT Siliguri, DRT Cuttack, DRT Guwahati. Hyderabad and
  Visakhapatnam transferred from DRAT Chennai circuit (G.S.R. 134(E)/2000) to
  DRAT Kolkata per G.S.R. 538(E)/2018 Recruitment Rules First Schedule; reconfirmed
  G.S.R. 429(E)/2021. DRAT Chennai official jurisdiction excludes Hyderabad and
  Visakhapatnam. Standalone DRAT s.8 reallocation Gazette PDF not located;
  recruitment rules are conclusive administrative evidence.
