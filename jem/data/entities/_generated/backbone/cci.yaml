id: cci
name: Competition Commission of India
name_hindi: भारतीय प्रतिस्पर्धा आयोग
abbreviation: CCI
aliases:
  - Competition Commission of India

type: RegulatoryBodyQJ
cluster: regulatory_bodies
level_of_government: Central

jurisdiction_scope:
  is_all_india: true
  jurisdiction_types:
    - anti_competitive_agreements
    - abuse_of_dominance
    - combinations_review
    - competition_advocacy

created_year: 2003
operational_status: Active

constitutional_basis: null
statutory_basis: >-
  Competition Act 2002 (Act 12 of 2003), s.7 (establishment of CCI);
  operationally active from 2009 after Supreme Court challenge resolved.
  Competition (Amendment) Act 2023 strengthened merger review powers and
  settlement provisions.

appointment:
  nominates: ministry_corporate_affairs
  recommends: null
  consulted: []
  consultation_binding: null
  formally_appoints: central_government
  criteria_public: true
  tenure: "Chairperson and Members: 5 years or age 65, whichever is earlier"
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false
  removal_independent_committee: true

funding:
  primary_source: Ministry_Budget
  ministry_responsible: ministry_corporate_affairs

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: ministry_corporate_affairs

complaint_mechanism:
  lokpal_jurisdiction: "No"
  lokpal_jurisdiction_note: >-
    CCI members not covered by Lokpal jurisdiction; oversight via MCA
    and judicial review.
  removal_mechanism: >-
    Removal by Central Government on grounds of misbehaviour after
    inquiry by a Supreme Court judge (Competition Act 2002, s.11)

case_volume:
  data_as_of: null
  pending_cases: null
  source_type: AnnualReport
  source_url: null

judge_strength:
  data_as_of: null
  allotted: null
  appointed: null
  source_type: AnnualReport
  source_url: null
  notes: Regulatory body; Member count set by Competition Act 2002, s.8.

data_quality: partial
data_quality_notes: >-
  CCI orders are appealable to NCLAT (Competition Act 2002, s.53A as
  amended by Finance Act 2017). Relationship recorded in relationships
  file. ministry_corporate_affairs entity id assumed present in graph.

