id: drt_hyderabad
name: Debt Recovery Tribunal, Hyderabad
name_hindi: ऋण वसूली अधिकरण, हैदराबाद
abbreviation: DRT Hyderabad
aliases:
  - DRT-I Hyderabad
  - DRT-II Hyderabad
  - Debts Recovery Tribunal Hyderabad

type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central

jurisdiction_scope:
  states_covered:
    - TS
    - AP
  is_all_india: false
  jurisdiction_types:
    - debt_recovery
    - sarfaesi_appeals

created_year: 1999
operational_status: Active

statutory_basis: >
  Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act),
  s. 3; SARFAESI Act, 2002, s. 17. Original DRT Hyderabad established vide G.S.R.
  647(E) dated 21 September 1999. DRT-2 Hyderabad added by S.O. 254(E) dated
  2 February 2017 (existing bench renamed DRT-1 Hyderabad, Telangana). Appellate
  supervision: DRAT Kolkata per G.S.R. 538(E) dated 8 June 2018 (DRAT Kolkata
  Recruitment Rules), reconfirmed by G.S.R. 429(E) (June 2021). Originally under
  DRAT Chennai circuit (G.S.R. 134(E), 17 February 2000) until transfer to DRAT
  Kolkata circuit by or before the 2018 Recruitment Rules.

appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: '5 years or until age 62, whichever is earlier'
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false

funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_of_finance

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: hc_telangana

complaint_mechanism:
  bias_complaint_to:
    - body: hc_telangana
      mechanism: >
        Supervisory jurisdiction of Telangana High Court under Articles 226/227;
        writ petition before Telangana High Court. Andhra Pradesh High Court may
        also have supervisory jurisdiction over Hyderabad DRT for AP matters
        following bifurcation — exact split not definitively resolved in secondary
        sources; left partial.
      complainant_has_locus: true
      is_public_process: true
      external_to_judiciary: false
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: >
    Presiding Officer is a judicial officer equivalent to District Judge; Lokpal
    jurisdiction does not extend to judicial functions of tribunal officers.
  source: RDDBFI Act 1993; Constitution of India Arts 226-227

data_quality: partial
data_quality_notes: >
  DRAT assignment RESOLVED: DRT Hyderabad (I & II) are under DRAT Kolkata
  (drat_kolkata). Evidence chain: (1) G.S.R. 134(E), 17 Feb 2000 established DRAT
  Chennai with Hyderabad and Visakhapatnam in the original southern circuit;
  (2) S.O. 254(E), 2 Feb 2017 created DRT-2 Hyderabad and realigned post-AP
  bifurcation jurisdictions; (3) G.S.R. 538(E), 8 Jun 2018 — DRAT Kolkata
  Recruitment Rules First Schedule groups DRT-1 Hyderabad, DRT-2 Hyderabad, and
  DRT Visakhapatnam with DRAT Kolkata (common cadre/administrative circuit);
  (4) G.S.R. 429(E), Jun 2021 amendment reconfirms same grouping; (5) DRAT Chennai
  official jurisdiction page lists 9 southern DRTs and excludes Hyderabad and
  Visakhapatnam. vLex and similar sources reflected the superseded G.S.R. 134(E)
  2000 table. Specific standalone DRAT s.8 reallocation Gazette PDF not located
  on egazette.gov.in in this pass; 2018 Recruitment Rules are the conclusive GoI
  instrument for current appellate circuit assignment.

unverified_fields:
