data_quality: partial
data_quality_notes: >-
  EPFAT is a single-bench tribunal at New Delhi adjudicating appeals from EPFO
  order under EPF Act ss.7A (determination of dues), 7B (review), 14B (damages).
  Appeals from EPFAT lie to HC under Art. 226/227 and to Supreme Court under
  Art.136. Social Security Code 2020 (enacted; rules under consultation) will
  eventually subsume EPFAT into broader Social Security Appellate Tribunal
  framework — transition not yet implemented. Pendency data not publicly available
  in structured form. Website: https://epfat.gov.in/.

