id: epfat
name: Employees' Provident Fund Appellate Tribunal
name_hindi: कर्मचारी भविष्य निधि अपीलीय अधिकरण
abbreviation: EPFAT
aliases:
  - EPF Appellate Tribunal
  - EPFAT New Delhi

type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central

created_year: 1952
abolished_year: null
operational_status: Active

constitutional_basis: null
statutory_basis: >-
  Employees' Provident Funds and Miscellaneous Provisions Act 1952, s.7D (as
  amended). EPFAT hears appeals against orders passed by EPF authorities under
  ss.7A, 7B, 14B of the Act. Seat at New Delhi. Note: Employees' Provident Funds
  and Miscellaneous Provisions Act 1952 and EPFAT are continued under Social
  Security Code 2020 (enacted but not yet fully notified/operative as of June 2026;
  1952 Act remains governing law).

