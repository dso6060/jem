constitutional_basis: null
statutory_basis: >-
  Industrial Disputes Act 1947, s.7A (Industrial Tribunals). State Governments
  constitute State Industrial Tribunals to adjudicate matters in the Second and
  Third Schedules of the Act (Third Schedule includes wages, hours, bonus, profit-
  sharing, retrenchment, closure). State Industrial Tribunals have wider jurisdiction
  than Labour Courts. Distinction from CGIT (s.7A): State-sphere industries are
  referred to State Industrial Tribunals; Central-sphere industries to CGIT.
  Industrial Relations Code 2020 (enacted; not yet operative as of June 2026).

