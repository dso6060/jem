data_quality: partial
data_quality_notes: >-
  Generic node for State Industrial Tribunals (state sphere) constituted under
  IDA 1947 s.7A. Distinction from cgit_* nodes: these handle State Government
  references for state-sphere industries (industries not in the Central sphere
  list per IDA s.2(a) read with Ministry of Labour orders). Appeals from State
  IT awards lie to respective HC under Art. 226/227; no statutory appeal route.
  Awards enforceable as Civil Court decrees (s.17A). Industrial Relations Code
  2020 will replace this structure when notified. Count: 20–30 benches nationally;
  exact figure not centrally published. ministry_responsible left null — each
  state's Labour Department.

