  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: 'Presiding Officer is a judicial officer equivalent to District Judge; Lokpal jurisdiction does
    not extend to judicial functions of tribunal officers.

    '
  source: RDDBFI Act 1993; Constitution of India Arts 226-227
data_quality: partial
data_quality_notes: 'Kolkata has three DRT benches (DRT-I, DRT-II, DRT-III) under DRAT Kolkata. This entity represents the
  Kolkata location. Territorial jurisdiction covers West Bengal and Sikkim (Siliguri bench separately covers North Bengal/Sikkim
  catchment; exact split requires Gazette sourcing). AppealableTo → drat_kolkata.

  Option B rollup: 3 physical DRT(s) at this location (DRT-I/II/III) rolled into single city entity per MoF composition table;
  see drt.etribunals.gov.in. v1.2 judge_strength stub attached'
