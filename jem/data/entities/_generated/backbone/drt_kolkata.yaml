created_year: 1994
operational_status: Active
statutory_basis: 'Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act), s. 3; SARFAESI Act, 2002,
  s. 17. Kolkata has three benches (DRT-I, DRT-II, DRT-III) under DRAT Kolkata appellate supervision. Territorial jurisdiction
  notified by Central Government. Note: Siliguri has a separate DRT bench (drt_siliguri) also under DRAT Kolkata.

  '
