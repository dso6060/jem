structural_variations:
- variation_id: esi_court_state
  description: Each state with ESI coverage has one or more ESI Courts, typically co-located with existing civil courts at
    district HQ or industrial town. Number varies by state industrial activity (~150 designated courts nationally estimated).
  applicable_to:
  - state_level
  source: ESI Act 1948 s.74(2) — State Government notifies courts by state gazette
  independence_risk_note: Designated civil/magistrate courts with own docket; ESI matters added as additional jurisdiction.
    Capacity strain where industrial disputes heavy (e.g. Tamil Nadu, Maharashtra, Karnataka).
data_quality: partial
data_quality_notes: 'Generic node for approximately 150 ESI Courts designated under ESI Act s.74 across industrialised states.
  Not a separately constituted tribunal — existing civil courts designated by state governments. Exact count and list of designated
  courts not centrally published by ESIC. Appeals from ESI Court → respective HC under s.82. cluster: subordinate_courts is
  appropriate (designated civil court jurisdiction); type: SpecialCourt reflects the specialised ESI jurisdiction designation.
  funding via State_Consolidated_Fund (court infrastructure) while ESIC (central body) provides administrative support — mixed
  funding pattern not separately quantifiable. ministry_responsible left null (each state''s Law/Labour Dept. designates;
  no single central entity_id applicable). v1.2 judge_strength stub attached'
