operational_status: Active
constitutional_basis: null
statutory_basis: Employees' State Insurance Act 1948, ss.74–82 (Chapter VII — Adjudication of Disputes and Claims). ESI Courts
  are designated by the respective State Government from existing civil or judicial magistrate courts; no separate infrastructure.
  Jurisdiction over disputes as to ESI contributions, benefits, penalties. Appeals from ESI Court lie to the respective High
  Court (s.82).
