  removal_mechanism: Designated judicial officer; complaints through High Court administrative supervision channel. No special
    removal mechanism under ESI Act.
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: Designated judicial officer exercises judicial functions; excluded from Lokpal jurisdiction in
    judicial capacity.
