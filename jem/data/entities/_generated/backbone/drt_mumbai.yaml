data_quality: partial
data_quality_notes: 'Mumbai has three DRT benches (DRT-I, DRT-II, DRT-III) under DRAT Mumbai. This entity represents the Mumbai
  location; bench-specific entities may be warranted if Gazette notification addresses are sourced from drt.gov.in. Territorial
  jurisdiction: Maharashtra and DNH&DD (per standard DRT Mumbai practice). Pune and Nagpur are separate DRT locations under
  the same DRAT Mumbai umbrella.

  Option B rollup: 3 physical DRT(s) at this location (DRT-I/II/III) rolled into single city entity per MoF composition table;
  see drt.etribunals.gov.in. v1.2 judge_strength stub attached'
