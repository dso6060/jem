data_quality: partial
data_quality_notes: 'SINGLE BENCH — NO SEPARATE AFT JAMMU ENTITY: Official name in SRO-12(E) and on aftdelhi.nic.in / aft.gov.in
  is "Regional Bench, (Srinagar) at Jammu". One bench, physically at Military Station Sanjuwan, Jammu-180011. "Temporarily"
  in the 2016 gazette has not been rescinded; no notification moving the bench to Srinagar city found as of June 2026. Supersedes
  aft_jammu stub (colloquial alias only).

  LADAKH GAP: SRO-12(E) predates J&K Reorganisation Act 2019. No updated MoD notification confirming UT of Ladakh coverage
  found. LA listed in uts_covered provisionally — no other AFT bench notified for Ladakh.

  Contact: registraraft.jk@gov.in. Appellate path: AFT → SC per s.30 (not HC).


  M-T6 review Jun 2026: no post-2019 Ladakh gazette found; LA remains provisional in uts_covered. v1.2 judge_strength stub
  attached'
