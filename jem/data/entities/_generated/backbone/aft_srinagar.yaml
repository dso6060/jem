statutory_basis: 'Armed Forces Tribunal Act 2007 s.5(4); MoD Notification SRO-12(E) dated 17 November 2016 — "the Bench of
  the Armed Forces Tribunal, Srinagar (temporarily to be located in Jammu) with effect from the 17th day of November, 2016,
  which shall have jurisdiction within the territorial limits of the State of Jammu and Kashmir." Cabinet approval for Srinagar
  and Jabalpur benches: PIB release, 8 August 2014.

  '
