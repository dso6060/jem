structural_gap:
  flag: true
  gaps:
  - gap_id: cit_a_appeal_backlog
    gap_type: Data_Gap
    gap_severity: High
    gap_description: >-
      Commissioner (Appeals) units are overburdened — appeals filed exceed
      disposals and pendency carries forward annually (Finance Act 2023
      memorandum). Union Budget 2023-24 proposed ~100 JCIT(A) posts for small
      appeals; e-Appeals Scheme 2023 partially addresses backlog. No stable
      official CBDT disaggregated pending-case count URL at authoring time.
    gap_source: >-
      PIB Union Budget 2023-24 Highlights (PRID 1895315); Finance Act 2023
      s.246 substitution memorandum
    gap_since_year: 2000
    gap_status: Partial_Addressed
data_quality: partial
data_quality_notes: >-
  TYPE NOTE: Typed ExecutiveBody / executive_interface rather than RegulatoryBodyQJ because CIT(A) officers are IRS cadre within the Income Tax Department, not independently appointed tribunal members; they exercise quasi-judicial powers departmentally. Maintainer may reconsider if a departmental-adjudicator subtype is added to the schema.

  APPELLATE CHAIN: AO → CIT(A) → ITAT → HC (questions of law) → SC. CIT(A) is the first appellate forum under IT Act 1961 s.246A.

  Judge-strength concept not applicable — IRS officer posts sanctioned by CBDT/DoPT but not disaggregated publicly per CIT(A) unit.
