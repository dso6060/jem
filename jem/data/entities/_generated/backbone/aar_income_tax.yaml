data_quality: partial
data_quality_notes: 'Independence concern: Finance Act 2021 reconstitution replaced retired SC Judge Chairman with senior
  IRS officers — structural shift from judicial to departmental composition. Contested by taxpayer bar (pending writ petitions
  in several HCs challenging constitutionality of non-judicial composition for advance rulings).   Two Boards at Delhi and
  Mumbai constituted by CBDT Notification No. 96/2021 (S.O. 3561(E)) dated 1 September 2021 — corrected from prior erroneous
  reference to 92/2021 (drt_b4). Rulings binding on applicant and CBDT (s.245S) but subject to writ jurisdiction of HC under
  Art.226/227. No appeal to ITAT or HC as of right. created_year reflects original AAR (Finance Act 1993 Chapter XIX-B); reconstitution
  year 2021. v1.2 judge_strength stub attached'
