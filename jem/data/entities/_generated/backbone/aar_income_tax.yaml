statutory_basis: Income Tax Act 1961, Chapter XIX-B (ss.245N–245V) as substituted by Finance Act 2021 s.98 — reconstituted
  as 'Board for Advance Rulings' from 'Authority for Advance Rulings'. Two Boards constituted with retired ITAT Presidents/Vice
  Presidents. Original AAR (single-member, retired SC Judge as Chairman) abolished by Finance Act 2021 w.e.f. 01.04.2021.
