data_quality_notes: >
  Entity established under COPRA 1986; reconstituted under Consumer Protection
  Act 2019. created_year reflects COPRA 1986 coming into force (1987). Current
  statutory_basis is CPA 2019 s.42.
  ministry_responsible is null — Maharashtra Consumer Affairs and Public
  Distribution Department is the administrative department but no JEM entity
  ID exists for it.
  Consumer commissions are not integrated with NJDG as of 2026; case_volume
  not populated. AppealableTo ncdrc per CPA 2019 s.51 — in relationships file.
