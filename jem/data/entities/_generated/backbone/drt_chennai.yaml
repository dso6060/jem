id: drt_chennai
name: Debt Recovery Tribunal, Chennai
name_hindi: ऋण वसूली अधिकरण, चेन्नई
abbreviation: DRT Chennai
aliases:
- DRT-I Chennai
- Debts Recovery Tribunal Chennai
- DRT-II Chennai
- DRT-III Chennai
type: CentralTribunal
cluster: tribunals_adr
