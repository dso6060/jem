data_quality: partial
data_quality_notes: >-
  EPFO is classified ExecutiveBody (not CentralTribunal) because it is primarily
  an executive/statutory fund management body. Its quasi-judicial enforcement
  function (ss.7A, 14B orders) is exercised by designated officers whose orders
  feed EPFAT's appellate jurisdiction. EPFO administers EPF, EPS (Employees'
  Pension Scheme 1995), and EDLI (Employees' Deposit Linked Insurance Scheme 1976).
  Manages ~280 million subscriber accounts (as of 2024 EPFO annual report);
  collects ~INR 1.8 lakh crore annually. Social Security Code 2020 will reconstitute
  governance structure when notified.

