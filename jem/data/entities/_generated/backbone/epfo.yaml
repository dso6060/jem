id: epfo
name: Employees' Provident Fund Organisation
name_hindi: कर्मचारी भविष्य निधि संगठन
abbreviation: EPFO
aliases:
  - Employees' Provident Fund Organisation of India
  - EPFO India

type: ExecutiveBody
cluster: executive_interface
level_of_government: Central

created_year: 1952
abolished_year: null
operational_status: Active

constitutional_basis: null
statutory_basis: >-
  Employees' Provident Funds and Miscellaneous Provisions Act 1952, ss.5A–5AA
  (Central Board of Trustees), ss.5D–5E (Central Provident Fund Commissioner).
  EPFO exercises quasi-judicial functions through its officers under ss.7A
  (determination of EPF dues — Enquiry Officers), 7B (review), 14B (imposition
  of damages). These officer-level adjudicative orders are appealable to EPFAT.
  EPFO itself is a statutory executive body; only its adjudicatory officers have
  quasi-judicial character.

