id: drp_income_tax
name: Dispute Resolution Panel (Income Tax)
name_hindi: विवाद समाधान पैनल (आयकर)
abbreviation: DRP
aliases:
  - Dispute Resolution Panel
  - DRP (IT)

type: RegulatoryBodyQJ
cluster: regulatory_bodies
level_of_government: Central

created_year: 2009
abolished_year: null
operational_status: Active

constitutional_basis: null
statutory_basis: >-
  Income Tax Act 1961, s.144C as inserted by Finance (No.2) Act 2009 s.42. DRP
  is a collegium of three Principal Commissioners / Commissioners of Income Tax
  designated by CBDT. Not a separate statutory tribunal — constituted as an
  alternative dispute resolution mechanism within CBDT for eligible assesses
  (primarily foreign companies and transfer-pricing cases).

