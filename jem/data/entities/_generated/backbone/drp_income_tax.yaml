data_quality: partial
data_quality_notes: >-
  Independence circularity concern: DRP members are CBDT officers adjudicating
  objections to draft assessment orders passed by CBDT officers. Directions issued
  by DRP under s.144C(5) are binding on the Assessing Officer but do not preclude
  ITAT appeal (s.144C(10) — assessee may appeal to ITAT against final order;
  department may not). DRP is NOT a tribunal distinct from CBDT — it is an
  internal collegium. Classifying as RegulatoryBodyQJ in regulatory_bodies cluster
  to reflect quasi-judicial function within the executive; type CentralTribunal
  would mischaracterise independence. DRP panels constituted at major cities
  (Delhi, Mumbai, Chennai, Kolkata, Bengaluru, Hyderabad, Pune, Ahmedabad) per
  CBDT notifications. No public annual report. Pendency data not publicly
  disaggregated from ITAT inflows.

