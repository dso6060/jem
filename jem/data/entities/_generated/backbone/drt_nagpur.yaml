id: drt_nagpur
name: Debt Recovery Tribunal, Nagpur
name_hindi: ऋण वसूली अधिकरण, नागपुर
abbreviation: DRT Nagpur
aliases:
  - Debts Recovery Tribunal Nagpur

type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central

jurisdiction_scope:
  states_covered:
    - MH
  is_all_india: false
  jurisdiction_types:
    - debt_recovery
    - sarfaesi_appeals

created_year: 2000
operational_status: Active

statutory_basis: >
  Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act),
  s. 3; SARFAESI Act, 2002, s. 17. Established vide G.S.R. 945(E) dated 29 December
  2000 (same notification as DRT Mumbai-2 and DRT Mumbai-3). Single-bench tribunal
  under DRAT Mumbai. Current jurisdiction per S.O. 4719(E) dated 4 October 2022:
  Nagpur, Bhandara, Gondia, Wardha, Amravati, Yavatmal, Gadchiroli, Akola, Buldhana,
  Washim, and Chandrapur districts of Maharashtra, and districts of Chhindwara, Seoni,
  and Balaghat of Madhya Pradesh.

appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: '5 years or until age 62, whichever is earlier'
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false

funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_of_finance

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: hc_bombay

complaint_mechanism:
  bias_complaint_to:
    - body: hc_bombay
      mechanism: >
        Supervisory jurisdiction of Bombay High Court (Nagpur Bench) under Arts
        226/227; writ petition before Bombay HC Nagpur Bench.
      complainant_has_locus: true
      is_public_process: true
      external_to_judiciary: false
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: >
    Presiding Officer is a judicial officer equivalent to District Judge.
  source: RDDBFI Act 1993; Constitution of India Arts 226-227

data_quality: partial
data_quality_notes: >
  G.S.R. 945(E) dated 29 December 2000. District jurisdiction per BankAuctions.in
  and S.O. 4719(E) dated 4 October 2022 (not fully retrieved for this circuit — ibclaw
  page token limit reached before Mumbai circuit table). BankAuctions.in lists: Nagpur,
  Bhandara, Gondiya, Amravati, Chandrapur, Yavatmal, Gadchiroli, Akola, Buldhana,
  Washim, Wardha. Also covers MP districts Chhindwara, Seoni, Balaghat (per CGIT
  Nagpur table cross-check). DRAT Mumbai supervision confirmed.

sources:
