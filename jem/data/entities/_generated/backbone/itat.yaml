    url: https://incometaxindia.gov.in/pages/acts/income-tax-act.aspx
    type: GoIWebsite
    accessed_date: '2026-05-18'
  - label: "Tribunals Reforms Act 2021 — India Code"
    url: https://india-code.nic.in/acts-detail/MjY5MzQ=
    type: CentralAct
    accessed_date: '2026-05-18'
  - label: "ITAT — Official Website"
    url: https://itat.gov.in
    type: GoIWebsite
    accessed_date: '2026-05-18'