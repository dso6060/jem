id: state_electricity_appellate_tribunal_generic
name: State Electricity Ombudsman / Appellate Mechanism — Generic
name_hindi: राज्य विद्युत अपीलीय / लोकपाल तंत्र — सामान्य
aliases:
  - State Electricity Ombudsman
  - SERC consumer grievance mechanism

type: StateTribunal
cluster: regulatory_bodies
level_of_government: State

created_year: 2003
operational_status: Active

constitutional_basis: null
statutory_basis: >
  Electricity Act 2003 ss.42(6), 111 — SERC orders appeal to APTEL (central);
  s.42(6) enables state Electricity Ombudsman schemes for distribution-licensee
  consumer complaints. This entity models residual state-level ombudsman /
  grievance forums distinct from APTEL.

