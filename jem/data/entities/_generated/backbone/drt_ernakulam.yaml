  - body: hc_kerala
    mechanism: 'Supervisory jurisdiction of Kerala High Court under Arts 226/227; writ petition before Kerala High Court.

      '
    complainant_has_locus: true
    is_public_process: true
    external_to_judiciary: false
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: 'Presiding Officer is a judicial officer equivalent to District Judge.

    '
  source: RDDBFI Act 1993; Constitution of India Arts 226-227
data_quality: partial
data_quality_notes: Two Ernakulam benches (DRT-1 and DRT-2). DRT-1 established G.S.R. 397(E) dated 4 October 1999. District
  jurisdiction per S.O. 4717(E) dated 4 October 2022 (ibclaw) sourced and included above. DRAT Chennai supervision confirmed
  by official DRAT Chennai website (Jurisdiction page). Lakshadweep under DRT-1 per original BankAuctions.in reference. This
  entity represents the Ernakulam location; bench- specific entities (drt_ernakulam_1, drt_ernakulam_2) may be warranted when
  bench addresses are confirmed from drt.gov.in. v1.2 judge_strength stub attached
