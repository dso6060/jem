id: drt_ernakulam
name: Debt Recovery Tribunal, Ernakulam
name_hindi: ऋण वसूली अधिकरण, एर्नाकुलम
abbreviation: DRT Ernakulam
aliases:
- DRT Kochi
- Debts Recovery Tribunal Ernakulam
type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central
jurisdiction_scope:
  states_covered:
  - KL
  uts_covered:
  - LD
  is_all_india: false
  jurisdiction_types:
  - debt_recovery
  - sarfaesi_appeals
created_year: 1999
operational_status: Active
statutory_basis: 'Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act), s. 3; SARFAESI Act, 2002,
  s. 17. Originally established vide G.S.R. 397(E) dated 4 October 1999 as a single bench. A second bench (DRT-2 Ernakulam)
  was subsequently established. Current jurisdiction per S.O. 4717(E) dated 4 October 2022: DRT-1 covers Ernakulam, Malappuram,
  Kozhikode, Palakkad, Wayanad, Kannur, and Kasaragod; DRT-2 covers Thiruvananthapuram, Kollam, Pathanamthitta, Kottayam,
  Alappuzha, Thrissur, and Idukki. Both under DRAT Chennai.

  '
