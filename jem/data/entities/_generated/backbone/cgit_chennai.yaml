statutory_basis: 'Industrial Disputes Act, 1947, s. 7A (Central Government Industrial Tribunal) and s. 7B (Labour Court).
  Established by notification of the Central Government in the Official Gazette. Also has jurisdiction over EPF/MP Act 1952
  appeals consequent upon Finance Act, 2017 amendments to the ID Act. Jurisdiction: Tamil Nadu and UT of Puducherry, per official
  cgit.labour.gov.in jurisdiction table.

  '
