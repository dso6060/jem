id: drt_ahmedabad
name: Debt Recovery Tribunal, Ahmedabad
name_hindi: ऋण वसूली अधिकरण, अहमदाबाद
abbreviation: DRT Ahmedabad
aliases:
- DRT-I Ahmedabad
- DRT-II Ahmedabad
- Debts Recovery Tribunal Ahmedabad
- DRT-III Ahmedabad
type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central
jurisdiction_scope:
  states_covered:
  - GJ
  - RJ
  is_all_india: false
  jurisdiction_types:
  - debt_recovery
  - sarfaesi_appeals
created_year: 1994
operational_status: Active
statutory_basis: 'Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act), s. 3; SARFAESI Act, 2002,
  s. 17. Ahmedabad has two benches (DRT-I, DRT-II) under DRAT Mumbai appellate supervision. Territorial jurisdiction notified
  by Central Government; covers Gujarat; portions of Rajasthan may be shared with DRT Jaipur.

  '
appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: 5 years or until age 62, whichever is earlier
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false
funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_of_finance
audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: hc_gujarat
complaint_mechanism:
  bias_complaint_to:
  - body: hc_gujarat
    mechanism: 'Supervisory jurisdiction of Gujarat High Court under Articles 226/227; writ petition before Gujarat High Court.

      '
    complainant_has_locus: true
    is_public_process: true
    external_to_judiciary: false
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: 'Presiding Officer is a judicial officer equivalent to District Judge; Lokpal jurisdiction does
    not extend to judicial functions of tribunal officers.

    '
  source: RDDBFI Act 1993; Constitution of India Arts 226-227
data_quality: partial
data_quality_notes: 'Ahmedabad has two DRT benches (DRT-I, DRT-II) under DRAT Mumbai. DRAT Mumbai supervision confirmed across
  multiple consistent secondary sources (TaxTMI, jabalpuradvocate.com). Exact Rajasthan district distribution between DRT
  Ahmedabad and DRT Jaipur requires Gazette notification sourcing.

  Option B rollup: 2 physical DRT(s) at this location (DRT-I/II/III) rolled into single city entity per MoF composition table;
  see drt.etribunals.gov.in. v1.2 judge_strength stub attached'
