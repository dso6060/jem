id: drt_siliguri
name: Debt Recovery Tribunal, Siliguri
name_hindi: ऋण वसूली अधिकरण, सिलीगुड़ी
abbreviation: DRT Siliguri
aliases:
- Debts Recovery Tribunal Siliguri
type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central
jurisdiction_scope:
  states_covered:
  - WB
  is_all_india: false
  jurisdiction_types:
  - debt_recovery
  - sarfaesi_appeals
created_year: 2017
operational_status: Active
statutory_basis: 'Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act), s. 3; SARFAESI Act, 2002,
  s. 17. Established vide S.O. 831(E) dated 15 March 2017, effective 16 March 2017, which superseded G.S.R. 84(E) dated 6
  February 2002. Address: Hawkers'' Co-operative Society Ltd., 1st Floor, Opp. United Bank of India, North Bengal Regional
  Office, Hill Cart Road, Pradhan Nagar, Siliguri-734003. Jurisdiction per S.O. 831(E) table: Darjeeling, Jalpaiguri, Coochbehar,
  Uttar Dinajpur, Dakshin Dinajpur, Malda, and Murshidabad districts of West Bengal. Single-bench tribunal under DRAT Kolkata
  per G.S.R. 538(E)/2018.

  '
appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: 5 years or until age 62, whichever is earlier
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false
funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_of_finance
audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: hc_calcutta
complaint_mechanism:
  bias_complaint_to:
  - body: hc_calcutta
    mechanism: 'Supervisory jurisdiction of Calcutta High Court under Arts 226/227; writ petition before Calcutta High Court.
      Calcutta HC Circuit Bench at Jalpaiguri (established 2023) may also exercise territorial supervisory jurisdiction for
      North Bengal DRT matters — exact allocation not confirmed in secondary sources; left partial.

      '
    complainant_has_locus: true
    is_public_process: true
    external_to_judiciary: false
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: 'Presiding Officer is a judicial officer equivalent to District Judge.

    '
  source: RDDBFI Act 1993; Constitution of India Arts 226-227
data_quality: partial
data_quality_notes: 'DISTRICT TABLE FULLY SOURCED (drt_b4). S.O. 831(E) dated 15 March 2017 text retrieved in full from ibclaw.in
  (2026-06-12). Seven districts confirmed: Darjeeling, Jalpaiguri, Coochbehar, Uttar Dinajpur, Dakshin Dinajpur, Malda, Murshidabad.
  Address confirmed. DRT Kolkata-1/2/3 district splits also confirmed from same notification: DRT-1 covers Kolkata city (specified
  PSs) + Howrah + Hooghly; DRT-2 covers all remaining WB districts (excluding North/South 24 Parganas, the seven Siliguri
  districts, and Kolkata city areas) + Andaman & Nicobar Islands; DRT-3 covers Kolkata city (other PSs) + North/South 24 Parganas.
  v1.2 judge_strength stub attached'
