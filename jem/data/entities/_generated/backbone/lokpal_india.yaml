structural_gap:
  flag: true
  gaps:
    - gap_id: lokpal_chairperson_vacancy_closed
      gap_type: Appointment_Gap
      gap_severity: Moderate
      gap_description: >-
        Chairperson vacancy May 2022–Mar 2024 (Pinaki Chandra Ghose retired 27 May 2022;
        Justice A.M. Khanwilkar sworn in 10 Mar 2024). Full bench reconstituted Mar 2024.
        Gap closed — historical only.
      gap_source: Rashtrapati Bhavan; The Hindu, 10 Mar 2024
      gap_since_year: 2022
      gap_status: Closed
      gap_resolution_note: >-
        Chairperson vacancy closed 10 Mar 2024 (Justice A.M. Khanwilkar sworn
        in). Historical gap only — full bench operational; monitor lokpal.gov.in
        for future vacancies at end of five-year terms.
data_quality: partial
data_quality_notes: >-
  Fully operational as of Mar 2024. Chairperson Justice Ajay Manikrao Khanwilkar
  (oath 10 Mar 2024). Judicial members appointed Mar 2024 include Ritu Raj Awasthi,
  Lingappa Narayana Swamy, Sanjay Yadav. First chairperson Justice Pinaki Chandra Ghose
  (Mar 2019–May 2022). Selection Committee per Lokpal Act 2013 s.4 (PM, CJI, Lok Sabha
  Speaker, LoP, eminent jurist).
