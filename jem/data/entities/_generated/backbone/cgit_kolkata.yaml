data_quality: partial
data_quality_notes: >-
  Kolkata CGIT covers Central sphere industries in Eastern India. Physical seat:
  Kolkata. Jurisdiction: Central Government references under IDA 1947 s.10 for
  Eastern region. Additional CGIT seats exist at Chennai (Southern region) and
  Chandigarh/Jalandhar (Northern region) — those are not modelled in this batch.

