statutory_basis: >-
  Industrial Disputes Act 1947 s.7A. Kolkata bench handles Central Government
  references for Eastern India (West Bengal, Bihar, Jharkhand, Odisha, NE states
  and relevant UTs). IDA 1947 operative; Industrial Relations Code 2020 not yet
  in force as of June 2026.

