statutory_basis: Central Goods and Services Tax Act, 2017, s.109–110 (as amended by Finance Act 2023 — substituted ss.109–110A,
  inserted s.112A); notified benches under s.109(6). Principal Bench at New Delhi; State Benches in each state/UT.
