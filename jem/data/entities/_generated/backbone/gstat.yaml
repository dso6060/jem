    Schedule; removal mechanism under parent statute.
  source: CGST Act 2017 s.110A as amended
structural_variations:
- variation_id: gstat_principal_bench
  description: Principal Bench at New Delhi comprising President and two Technical Members (Centre + State). Hears appeals
    from AAAR, transfer petitions, and cross-empowerment matters.
  applicable_to:
  - national
  source: CGST Act 2017 s.109(1)(a) as amended by Finance Act 2023
  independence_risk_note: President post unfilled since enactment (2017–present, June 2026). Tribunal not operationally constituted
    despite 8+ years of GST implementation.
- variation_id: gstat_state_bench
  description: State Benches (one per state/UT or shared for smaller UTs) each comprising one Judicial Member and one Technical
    Member. 31 planned benches per Finance Act 2023. None constituted as of June 2026.
  applicable_to:
  - state_level
  source: CGST Act 2017 s.109(6) as amended; MoF Notification S.O. 1559(E) dated 06.04.2023 (locations notified).
  independence_risk_note: All 31 state/UT benches unoperational. Taxpayers unable to appeal AAR/AAAR orders; writ petitions
    to High Courts are the de facto remedy.
data_quality: partial
data_quality_notes: 'Structural_gap: CRITICAL. GSTAT not constituted for 8+ years since GST enactment (July 2017) through
  Finance Act 2023 amendments and beyond. MoF notified bench locations (April 2023) and amended appointment procedure (Finance
  Act 2023 s.110A) but President post and all Member posts remain vacant as of June 2026. No case_volume data possible (no
  sittings). Appointment sub-committee constituted under SC monitoring (Union of India v. Mohit Minerals, W.P.(C) 859/2022
  — SC directed expeditious constitution, order dated 19 May 2023). budget_figure not separately identified in Union Budget
  (subsumed under DoR establishment estimates pending constitution). Mohit Minerals SC judgment PDF URL verified live on webapi.sci.gov.in
  (drt_b4); main.sci.gov.in unreachable via automated access.

  M-T3 watch Jun 2026: still Not_Constituted; monitor egazette.gov.in and CBIC for bench notifications. v1.2 judge_strength
  stub attached'
