data_quality: partial
data_quality_notes: 'Generic stub covering GCM, SGCM, DCM, SCM convened under all three service Acts. Key structural gap:
  Summary Court Martial (SCM) has no right of appeal to AFT — the accused''s sole remedy is post-conviction petition to Chief
  of Army Staff / Central Government under Army Act 1950 § 164. This is a significant accountability lacuna. Pre-AFT (before
  2009 operationalisation), no external judicial body existed; High Courts exercised writ jurisdiction only. Appellate path
  (post-2007): finding/sentence → Confirming Authority → AFT (for GCM/DCM/SGCM). SCM sentences not appealable to AFT (AFT
  Act 2007 § 15 read with Army Act § 164). Appointment of court martial members: Convening Officer (generally a senior officer)
  convenes and nominates members; Judge Advocate (a JAG-branch officer) is appointed to advise on law. No civilian element
  in composition. No public docket or cause list; proceedings not published. judge_strength not modelled — court martial is
  an ad-hoc body, not a permanent court with sanctioned judicial posts. v1.2 judge_strength stub attached'
