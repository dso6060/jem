data_quality: partial
data_quality_notes: Generic node representing state-level VAT/commercial-tax appellate tribunals (~28 states maintain such
  bodies). Post-GST (July 2017) jurisdiction is exclusively for pre-GST legacy disputes; no new GST appeals can be filed until
  GSTAT is constituted. Some states (e.g. Telangana, Andhra Pradesh post- bifurcation) have merged or reconstituted these
  bodies. created_year 2003 is approximate — reflects the broad wave of state VAT Act enactments (2003–2006); some tribunals
  predate this under Sales Tax Acts. State-specific entities should be modelled separately when state packs are built (C15–C18).
  structural_variations cover major states only; 23 additional state variants not yet enumerated. funding.ministry_responsible
  left null — each state's Finance/Commercial Taxes Department administers; no single entity_id mapped yet in graph. v1.2
  judge_strength stub attached
