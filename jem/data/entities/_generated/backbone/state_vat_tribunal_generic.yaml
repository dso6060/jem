statutory_basis: 'Each state''s VAT/commercial-tax legislation, typically: (a) State Value Added Tax Act (2003–2006 era) —
  Tribunal constituted under respective state act; or (b) pre-VAT state Sales Tax Act tribunal continued. Post-GST (01.07.2017):
  jurisdiction restricted to pre-GST legacy disputes. Most states retain the tribunal body for legacy matters. A few states
  have integrated with State Goods and Services Tax Act 2017 appellate mechanisms pending GSTAT constitution.'
