  - sarfaesi_appeals
created_year: 2000
operational_status: Active
statutory_basis: 'Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act), s. 3; SARFAESI Act, 2002,
  s. 17. Originally notified vide G.S.R. 274(E) dated 31 March 2000 (covering northern UP + Uttarakhand jointly with Allahabad).
  Jurisdiction realigned by S.O. 454(E) dated 15 February 2017, effective 16 February 2017 (Dehradun/Uttarakhand carved out;
  Saharanpur division moved to DRT Dehradun). Current authoritative address and district table from S.O. 454(E)/2017: 600/1,
  University Road, Near Hanuman Setu Mandir, Lucknow-226007. Jurisdiction: Baghpat, Bulandsahar, Gautam Buddha Nagar, Ghaziabad,
  Hapur, Meerut, Hardoi, Lakhimpur Kheri, Lucknow, Raebareli, Sitapur, and Unnao districts in Uttar Pradesh. Single-bench
  tribunal under DRAT Allahabad.

  '
