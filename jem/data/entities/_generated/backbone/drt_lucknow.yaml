  source: RDDBFI Act 1993; Constitution of India Arts 226-227
data_quality: partial
data_quality_notes: 'DISTRICT TABLE UPGRADED from partial to sourced. Authoritative district list per S.O. 454(E) dated 15
  February 2017 (ibclaw.in full text retrieved 2026-06-12): Baghpat, Bulandsahar, Gautam Buddha Nagar, Ghaziabad, Hapur, Meerut,
  Hardoi, Lakhimpur Kheri, Lucknow, Raebareli, Sitapur, Unnao. Note: this is a relatively narrow NCR+central-UP footprint
  compared to the pre-2017 position. The larger UP district list in batch-2 delivery reflected the older G.S.R. 274(E)/2000
  scope; this entry supersedes it. Address from S.O. 454(E) table. S.O. 4719(E) dated 4 October 2022 (omnibus circuit redistribution)
  covered Chennai, Delhi, and Mumbai circuits only — not Allahabad/Lucknow/Dehradun. S.O. 454(E)/2017 remains operative (confirmed:
  Allahabad HC in Saurabh Gupta v. Union of India). v1.2 judge_strength stub attached'
