id: drt_lucknow
name: Debt Recovery Tribunal, Lucknow
name_hindi: ऋण वसूली अधिकरण, लखनऊ
abbreviation: DRT Lucknow
aliases:
- Debts Recovery Tribunal Lucknow
type: CentralTribunal
