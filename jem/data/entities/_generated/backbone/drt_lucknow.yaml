id: drt_lucknow
name: Debt Recovery Tribunal, Lucknow
name_hindi: ऋण वसूली अधिकरण, लखनऊ
abbreviation: DRT Lucknow
aliases:
  - Debts Recovery Tribunal Lucknow

type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central

jurisdiction_scope:
  states_covered:
    - UP
  is_all_india: false
  jurisdiction_types:
    - debt_recovery
    - sarfaesi_appeals

created_year: 2000
operational_status: Active

statutory_basis: >
  Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act),
  s. 3; SARFAESI Act, 2002, s. 17. Originally notified vide G.S.R. 274(E) dated
  31 March 2000; jurisdiction realigned by S.O. 454(E) dated 15 February 2017
  (Dehradun carved out for Uttarakhand) and by S.O. 4719(E) dated 4 October 2022.
  Single-bench tribunal under DRAT Allahabad.

appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: '5 years or until age 62, whichever is earlier'
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false

funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_of_finance

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: hc_allahabad

complaint_mechanism:
  bias_complaint_to:
    - body: hc_allahabad
      mechanism: >
        Supervisory jurisdiction of Allahabad HC (Lucknow Bench) under Arts 226/227;
        writ petition before Allahabad HC Lucknow Bench.
      complainant_has_locus: true
      is_public_process: true
      external_to_judiciary: false
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: >
    Presiding Officer is a judicial officer equivalent to District Judge.
  source: RDDBFI Act 1993; Constitution of India Arts 226-227

data_quality: partial
data_quality_notes: >
  Northern UP districts (Ambedkar Nagar, Aligarh, Agra, Barabanki, Balrampur,
  Bahraich, Bareilly, Bijnor, Bulandshahr, Baghpat, Faizabad, Ghaziabad, Gonda,
  Gautam Budh Nagar, Hathras, Hardoi, Jyotiba Phule Nagar, Lucknow, Lakhimpur,
  Meerut, Moradabad, Muzaffarnagar, Mathura, Pratapgarh, Pilibhit, Rampur, Rae
  Bareilly, Saharanpur, Shahjahanpur, Sitapur, Shravasti, Sultanpur, Unnao) sourced
  from BankAuctions.in G.S.R. 274(E) listing. Uttarakhand was in DRT Lucknow
  jurisdiction pre-2017; S.O. 454(E) dated 15 Feb 2017 carved out Dehradun as a
  separate DRT for Uttarakhand. Current district list per S.O. 4719(E) (4 Oct 2022)
  not fully extracted — that notification text not retrieved for this circuit; left
  partial.

unverified_fields:
  - field: jurisdiction_scope.districts
    note: >
      Full district list per S.O. 4719(E) dated 4 October 2022 not extracted for Allahabad/Lucknow circuit.
