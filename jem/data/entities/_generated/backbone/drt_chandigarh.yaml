created_year: 1994
operational_status: Active
statutory_basis: 'Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act), s. 3; SARFAESI Act, 2002,
  s. 17. Chandigarh has two benches (DRT-I, DRT-II) under DRAT Delhi appellate supervision. DRT-I has jurisdiction over Punjab
  (Amritsar, Barnala, Bathinda, Faridkot, Fatehgarh Sahib, Fazilka, Ferozepur, Gurdaspur, Hoshiarpur, Jalandhar, Kapurthala,
  Ludhiana, Mansa, Moga, Muktsar, Pathankot, Patiala, Rupnagar, Sangrur, SAS Nagar, Nawanshahr, Tarantaran) and Himachal Pradesh.
  DRT-II has jurisdiction over Haryana and UT Chandigarh (per Gazette notification cited in Tribune India, March 2017).

  '
appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: 5 years or until age 62, whichever is earlier
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false
