id: drt_chandigarh
name: Debt Recovery Tribunal, Chandigarh
name_hindi: ऋण वसूली अधिकरण, चंडीगढ़
abbreviation: DRT Chandigarh
aliases:
- DRT-I Chandigarh
- DRT-II Chandigarh
- Debts Recovery Tribunal Chandigarh
- DRT-III Chandigarh
type: CentralTribunal
cluster: tribunals_adr
