  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: hc_punjab_haryana
complaint_mechanism:
  bias_complaint_to:
  - body: hc_punjab_haryana
    mechanism: 'Supervisory jurisdiction of Punjab and Haryana High Court under Articles 226/227; writ petition before Punjab
      and Haryana High Court.

      '
    complainant_has_locus: true
    is_public_process: true
    external_to_judiciary: false
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: 'Presiding Officer is a judicial officer equivalent to District Judge; Lokpal jurisdiction does
    not extend to judicial functions of tribunal officers.

    '
  source: RDDBFI Act 1993; Constitution of India Arts 226-227; Tribune India 2022
data_quality: partial
data_quality_notes: 'Chandigarh has two DRT benches (DRT-I, DRT-II) under DRAT Delhi. Detailed district- level territorial
  split sourced from Tribune India reporting (March 2017) on Gazette notification for relocation of Chandigarh DRTs. J&K and
  Ladakh jurisdiction (per DRTchandigarh Facebook page: "J&K, Punjab, Haryana, Himachal Pradesh") is included but exact post-J&K
  Reorganisation Act 2019 applicability of RDDBFI requires confirmation; left partial.

  Option B rollup: 2 physical DRT(s) at this location (DRT-I/II/III) rolled into single city entity per MoF composition table;
  see drt.etribunals.gov.in. v1.2 judge_strength stub attached'
