id: cbdt
name: Central Board of Direct Taxes
name_hindi: केन्द्रीय प्रत्यक्ष कर बोर्ड
abbreviation: CBDT
aliases:
  - Central Board of Direct Taxes

type: ExecutiveBody
cluster: executive_interface
level_of_government: Central

jurisdiction_scope:
  is_all_india: true

created_year: 1963
operational_status: Active

statutory_basis: >
  Central Board of Revenue Act, 1963, s. 3 (bifurcation of the former Central Board
  of Revenue into CBDT and CBIC). Functions under the Income Tax Act, 1961 as the
  apex authority for administration of direct taxes (income tax, corporation tax,
  wealth tax). CBDT issues circulars, instructions, and notifications binding on
  income-tax authorities under s. 119 of the Income Tax Act, 1961. Supervises the
  Income Tax Department, Income Tax Appellate Tribunal (ITAT), Board for Advance
  Rulings at Delhi and Mumbai (Notification No. 96/2021), Dispute Resolution Panel
  (DRP), and Commissioner of Income Tax (Appeals) units.

