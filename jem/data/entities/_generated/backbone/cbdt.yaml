  source: Central Board of Revenue Act 1963; Income Tax Act 1961

data_quality: partial
data_quality_notes: >
  Expanded from C08 stub (drt_b3). Created: 1963 per Central Board of Revenue Act
  1963 bifurcation. HQ: North Block, New Delhi. CBDT is a statutory body under the
  Ministry of Finance (Department of Revenue). Key subordinate/supervised bodies:
  Income Tax Appellate Tribunal (ITAT), Principal Chief Commissioners across zones,
  CIT(A) units, Dispute Resolution Panel (DRP), Board for Advance Rulings (BAR) at
  Delhi and Mumbai. CBDT Notification No. 96/2021 (S.O. 3561(E)) dated 1 September
  2021 constitutes BAR replacing AAR-IT — corrected from prior erroneous 92/2021
  reference (drt_b4). Direct incometaxindia.gov.in PDF for 96/2021 returns 404;
  S.O. number confirmed via taxguru.in transcript.

