      DRAT Kolkata Recruitment Rules 2018 — G.S.R. 538(E) dated 8 June 2018;
      lists DRT Cuttack under DRAT Kolkata
    url: https://www.casemine.com/act/in/5f5f11199fca195c05ccdf06/amp
    type: GazetteNotification
    accessed_date: '2026-06-12'
  - label: 'DRT official portal — Ministry of Finance, DFS'
    url: https://drt.gov.in/
    type: GoIWebsite
    accessed_date: '2026-06-12'
