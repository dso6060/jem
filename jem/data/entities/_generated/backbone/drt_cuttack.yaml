id: drt_cuttack
name: Debt Recovery Tribunal, Cuttack
name_hindi: ऋण वसूली अधिकरण, कटक
abbreviation: DRT Cuttack
aliases:
  - Debts Recovery Tribunal Cuttack

type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central

jurisdiction_scope:
  states_covered:
    - OD
  is_all_india: false
  jurisdiction_types:
    - debt_recovery
    - sarfaesi_appeals

created_year: 1994
operational_status: Active

statutory_basis: >
  Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act),
  s. 3; SARFAESI Act, 2002, s. 17. Single-bench tribunal under DRAT Kolkata (per
  G.S.R. 257(E)/2000 DRAT Kolkata establishment and G.S.R. 538(E)/2018 DRAT Kolkata
  Recruitment Rules). Jurisdiction: State of Odisha (then Orissa).

appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: '5 years or until age 62, whichever is earlier'
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false

funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_of_finance

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: hc_orissa

complaint_mechanism:
  bias_complaint_to:
    - body: hc_orissa
      mechanism: >
        Supervisory jurisdiction of Orissa High Court under Arts 226/227;
        writ petition before Orissa High Court at Cuttack.
      complainant_has_locus: true
      is_public_process: true
      external_to_judiciary: false
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: >
    Presiding Officer is a judicial officer equivalent to District Judge.
  source: RDDBFI Act 1993; Constitution of India Arts 226-227

data_quality: partial
data_quality_notes: >
  DRAT Kolkata original establishment notification G.S.R. 257(E) dated 24 March 2000
  listed DRT Cuttack under its jurisdiction. Confirmed by G.S.R. 538(E) dated 8 June
  2018 (DRAT Kolkata Recruitment Rules). Created_year: 1994 is an estimate based on
  early DRT roll-out phase; specific GSR for DRT Cuttack establishment not extracted —
  the Recruitment Rules 2001 cited in the 2018 consolidation predate many bench-level
  rules, suggesting pre-2001 existence.

unverified_fields:
  - field: created_year
    note: >
      1994 is estimate; specific G.S.R. establishment number not retrieved.
sources:
  - label: 'RDDBFI Act 1993 (Recovery of Debts and Bankruptcy Act)'
    url: https://india-code.nic.in/CodeofActs13/19930951.pdf
    type: CentralAct
    accessed_date: '2026-06-12'
