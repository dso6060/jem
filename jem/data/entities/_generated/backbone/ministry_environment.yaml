id: ministry_environment
name: Ministry of Environment, Forest and Climate Change
name_hindi: पर्यावरण, वन और जलवायु परिवर्तन मंत्रालय
abbreviation: MoEFCC
aliases:
  - MoEFCC
  - Ministry of Environment and Forests

type: ExecutiveBody
cluster: legislative_executive
level_of_government: Central

created_year: 1985
# Department of Environment created 1980; elevated to Ministry of
# Environment and Forests in 1985. Renamed to include "Climate Change"
# in May 2014 (post-cabinet reshuffle). created_year is ministry
# establishment date (1985); 2014 rename is not a new entity.

operational_status: Active

statutory_basis: >
  Government of India (Allocation of Business) Rules, 1961 —
  Ministry of Environment, Forest and Climate Change entry;
  National Green Tribunal Act 2010 (s.3) is the primary legislation
  constituting NGT; MoEFCC demand head funds NGT.

funding:
  primary_source: Consolidated_Fund_India

data_quality: partial
data_quality_notes: >
  created_year 1985 is the ministry establishment date; confirm exact
  gazette notification. Ministry renamed in 2014 to add "Climate Change"
  — aliases block captures earlier name for graph resolution. The
  earlier form "Ministry of Environment and Forests" (MoEF) may appear
  as a source reference in older YAML files; treat as same entity.
  name_hindi unverified against official letterhead.
  funding block is ministry-level only; budget_figure_crore not populated.

sources:
