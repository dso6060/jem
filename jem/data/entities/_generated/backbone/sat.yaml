data_quality: partial
data_quality_notes: "created_year 1995 (Securities Laws Amendment Act 1995 — SAT constituted). Single bench in Mumbai with\
  \ India-wide jurisdiction (sat.gov.in). Statutory basis lists three Acts; SEBI Act 1992 is primary. PFRDA (2014) and IRDAI\
  \ jurisdiction added subsequently. ministry_responsible 'ministry_of_finance' — DEA demand head. Quorum crisis Dec 2023–Apr\
  \ 2024 after PO retirement; Justice P.S. Dinesh Kumar assumed charge Apr 2024.\n NJDG snapshot case_volume merged v1.2\
  \ judge_strength stub attached"
structural_gap:
  flag: true
  gaps:
    - gap_id: sat_quorum_crisis_dec2023
      gap_type: Appointment_Gap
      gap_severity: High
      gap_description: >-
        Near-functional collapse Dec 2023–Apr 2024 — Presiding Officer Justice Tarun
        Agarwala retired Dec 2023; only one technical member remained; final orders
        stalled for ~3 months. Justice P.S. Dinesh Kumar (former CJ Karnataka HC)
        assumed charge Apr 2024. Gap closed but backlog persisted.
      gap_source: Business Standard / Hindu BusinessLine, Apr 2024
      gap_since_year: 2023
      gap_status: Partial_Addressed
      gap_resolution_note: >-
        Quorum restored Apr 2024 with new Presiding Officer; ongoing risk if PO
        post falls vacant again. Monitor sat.gov.in and DoJ vacancy reports.
      gap_spillover:
      - affected_body: high_courts_all
        spillover_type: writ_load
        metric_note: >-
          Dec 2023–Apr 2024 SAT lacked judicial quorum; securities lawyers
          reported litigants constrained to approach High Courts for urgent
          relief against SEBI ex-parte orders — scope narrower than tribunal
          merits review. Business Standard (Feb 2024) quoted practitioners
          on HC writ fallback during vacancy.
        source_url: https://www.business-standard.com/companies/news/securities-appellate-tribunal-functioning-crippled-due-to-lack-of-members-124021201195_1.html
        source_label: Business Standard — SAT quorum crisis Feb 2024
        data_as_of: '2024-02-12'
        spillover_data_quality: partial
      - affected_body: sat
        spillover_type: appellate_backlog
        metric_note: >-
          SAT case_volume snapshot (Dec 2024): 420 pending; avg disposal
          365 days; backlog grew during adjournments when bench lacked PO.
        source_url: https://satweb.sat.gov.in/
        source_label: SAT official site + JEM case_volume snapshot
        data_as_of: '2024-12-01'
        spillover_data_quality: partial
    - gap_id: sat_single_bench_national
      gap_type: Appointment_Gap
      gap_severity: Moderate
      gap_description: >-
        Only one SAT bench (Mumbai) for nationwide SEBI/IRDAI/PFRDA appeals.
        CJI called for additional benches (Jul 2024) amid growing market volume;
        expansion pending since 2016 Budget announcement.
      gap_source: sat.gov.in; News on Air, Jul 2024
      gap_since_year: 1995
      gap_status: Open
      gap_resolution_note: >-
        Additional benches require Central Government notification under SAT
        establishment rules; Union Budget 2016 announced expansion but no fixed
        timeline. Contingent on legislative/administrative action — not date-bound.
