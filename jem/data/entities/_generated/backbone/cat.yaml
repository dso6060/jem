    url: https://india-code.nic.in/acts-detail/NzAx
    type: CentralAct
    accessed_date: '2026-05-18'
  - label: "Tribunals Reforms Act 2021 — India Code"
    url: https://india-code.nic.in/acts-detail/MjY5MzQ=
    type: CentralAct
    accessed_date: '2026-05-18'
  - label: "DoPT — Central Administrative Tribunal (official page)"
    url: https://dopt.gov.in/cat
    type: GoIWebsite
    accessed_date: '2026-05-18'