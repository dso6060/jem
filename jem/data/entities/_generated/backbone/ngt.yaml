# ── NGT — §1 type + §2 funding ───────────────────────────────────────────────
# New entity (not in bundle stub set); create at this path in repo.
# §1: type → CentralTribunal, cluster → tribunals_adr
# §2: funding.ministry_responsible → ministry_environment
# Note: NGT was NOT included in TRA 2021 schedule — appointment rules
# remain under NGT Act 2010 directly (see appointment block note).
# ─────────────────────────────────────────────────────────────────────────────

id: ngt
name: National Green Tribunal
name_hindi: राष्ट्रीय हरित अधिकरण
abbreviation: NGT
aliases:
  - National Green Tribunal

type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central

jurisdiction_scope:
  is_all_india: true
  jurisdiction_types:
    - Original    # substantial environmental questions — NGT Act 2010 s.14
    - Appellate   # appeals from statutory authorities — NGT Act 2010 s.16

created_year: 2010
# NGT Act 2010 received Presidential assent 2 June 2010; Tribunal
# constituted and became operational 18 October 2010.

operational_status: Active

statutory_basis: "National Green Tribunal Act 2010, Section 4"

appointment:
  # NGT Act 2010 s.5(1): Chairperson appointed by Central Government
  # after consultation with CJI.
  # s.6(1)(a): Chairperson must be a retired judge of the Supreme Court
  # or a serving/retired Chief Justice of a High Court.
  # Expert members: persons with 15+ years of experience or professional
  # qualifications in environmental/forest/natural resources field — s.6(1)(b).
  # ⚠ NGT is EXCLUDED from Tribunals Reforms Act 2021 — appointment mechanism
  # under NGT Act 2010 directly (not TRA 2021 selection committee).
  nominates: central_government
  formally_appoints: central_government
  consulted:
    - supreme_court_india   # CJI consultation — NGT Act 2010 s.5(1)
  consultation_binding: false
  criteria_public: true
  tenure: "5 years or until age 70 (Chairperson) / 67 (Expert Members), whichever is earlier — NGT Act 2010, s.7"
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false
  removal_independent_committee: true   # NGT Act 2010 s.10 — inquiry by SC judge

funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_environment
  # Ministry of Environment, Forest and Climate Change (MoEFCC).
  # NGT budget under MoEFCC demand head in Union Budget.
  # ⚠ VERIFY: confirm entity id 'ministry_environment' exists in graph.
  # Common alternate ids: ministry_moefcc, ministry_environment_forest — verify.

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true

data_quality: partial
data_quality_notes: >
  NGT is excluded from Tribunals Reforms Act 2021 — appointment block
  reflects NGT Act 2010 s.5–7 directly; verify this remains accurate if
  any subsequent amending legislation applies.
  NGT has 5 zonal benches (New Delhi principal; Chennai, Bhopal, Pune,
  Kolkata zonal) — structural_variations and bench routing to be added
  in a §6 pass if zonal benches are modelled as separate entities.
  ministry_responsible entity id 'ministry_environment' assumed — verify
  in graph. case_volume and judge_strength null — NGT Annual Report in §3/§7.

sources:
