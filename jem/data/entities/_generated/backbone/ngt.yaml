structural_gap:
  flag: true
  gaps:
  - gap_id: ngt_below_statutory_minimum
    gap_type: Capacity_Gap
    gap_severity: High
    gap_description: >-
      Functioning well below NGT Act 2010 s.4 statutory minimum of 10 judicial
      members and 10 expert members (each category notified up to 20). As of
      late 2025: 4 judicial + 6 expert members in post — 10 total, half the
      per-category floor. Do not conflate judicial and expert posts into a
      single "20 posts" vacancy percentage.
    gap_source: NGT Act 2010 s.4; Indian Express Nov 2025; Lok Sabha reply Dec 2025
    gap_since_year: 2010
    gap_status: Open
data_quality: partial
data_quality_notes: "NGT is EXCLUDED from Tribunals Reforms Act 2021 — appointment under NGT Act 2010 s.5-7 directly. NGT has 5 zonal benches (New Delhi principal; Chennai, Bhopal, Pune, Kolkata zonal) — bench routing Phase-2. Member strength: statutory minimum 10+10 (judicial + expert); late 2025 working strength 4 judicial + 6 expert per press/Lok Sabha reporting. ministry_responsible 'ministry_environment' assumed — verify canonical id in graph (may be 'ministry_moefcc').\n NJDG snapshot case_volume merged v1.2 judge_strength stub attached"
