    url: https://india-code.nic.in/acts-detail/MjA2OTU=
    type: CentralAct
    accessed_date: '2026-05-18'
  - label: "NGT — Official Website (MoEFCC)"
    url: https://greentribunal.gov.in
    type: GoIWebsite
    accessed_date: '2026-05-18'