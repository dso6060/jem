jurisdiction_scope:
  is_all_india: true
  jurisdiction_types:
  - Original
  - Appellate
created_year: 2010
operational_status: Active
statutory_basis: National Green Tribunal Act 2010, Section 4
appointment:
  nominates: central_government
  formally_appoints: central_government
  consulted:
  - supreme_court_india
  consultation_binding: false
  criteria_public: true
  tenure: 5 years or until age 70 (Chairperson) / 67 (Expert Members) — NGT Act 2010, s.7
