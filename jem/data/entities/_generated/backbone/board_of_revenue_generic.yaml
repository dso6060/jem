statutory_basis: 'Constituted under state-specific Board of Revenue Acts or Revenue Codes. Principal examples: Board of Revenue
  Act (Uttar Pradesh) 1922 (as amended); Rajasthan Board of Revenue Act 1949; Madhya Pradesh Land Revenue Code 1954 (Part
  II); Tamil Nadu Board of Revenue Abolition Act 1980 (abolished in TN — see structural_variations). Exercises highest revisional/appellate
  jurisdiction over revenue/land records, land acquisition compensation, and tenancy matters within the state.'
