id: drat_chennai
name: Debt Recovery Appellate Tribunal, Chennai
name_hindi: ऋण वसूली अपीलीय अधिकरण, चेन्नई
abbreviation: DRAT Chennai
aliases:
- Debts Recovery Appellate Tribunal Chennai
type: CentralTribunal
