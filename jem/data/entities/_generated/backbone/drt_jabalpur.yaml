id: drt_jabalpur
name: Debt Recovery Tribunal, Jabalpur
name_hindi: ऋण वसूली अधिकरण, जबलपुर
abbreviation: DRT Jabalpur
aliases:
  - Debts Recovery Tribunal Jabalpur

type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central

jurisdiction_scope:
  states_covered:
    - MP
    - CG
  is_all_india: false
  jurisdiction_types:
    - debt_recovery
    - sarfaesi_appeals

created_year: 1998
operational_status: Active

statutory_basis: >
  Recovery of Debts Due to Banks and Financial Institutions Act, 1993 (RDDBFI Act),
  s. 3; SARFAESI Act, 2002, s. 17. Established vide G.S.R. 181(E) dated 7 April 1998.
  Single-bench tribunal under DRAT Allahabad. Jurisdiction: States of Madhya Pradesh
  and Chhattisgarh. Chhattisgarh became a separate state in November 2000 upon the
  reorganisation of MP; its territory remained within DRT Jabalpur's catchment as
  no separate Chhattisgarh DRT has been established.

appointment:
  nominates: ministry_of_finance
  formally_appoints: central_government
  criteria_public: true
  tenure: '5 years or until age 62, whichever is earlier'
  reappointment_possible: false
  removal_authority: central_government
  removal_requires_parliament: false

funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_of_finance

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: true
  conduct_oversight_body: hc_madhya_pradesh

complaint_mechanism:
  bias_complaint_to:
    - body: hc_madhya_pradesh
      mechanism: >
        Supervisory jurisdiction of Madhya Pradesh High Court (principal seat Jabalpur)
        under Arts 226/227 for MP-territory matters before DRT Jabalpur.
      complainant_has_locus: true
      is_public_process: true
      external_to_judiciary: false
    - body: hc_chhattisgarh
      mechanism: >
        Chhattisgarh High Court at Bilaspur exercises Article 226/227 supervisory
        jurisdiction over courts and tribunals in Chhattisgarh territory per Art. 227
        (confirmed: CaseMine judgment shows Chhattisgarh HC directly referring SARFAESI
        matters to DRT Jabalpur without questioning jurisdiction). Litigants in
        Chhattisgarh matters before DRT Jabalpur may file writs in either Chhattisgarh
        HC or MP HC; Chhattisgarh HC has primary supervisory role for its state.
      complainant_has_locus: true
      is_public_process: true
      external_to_judiciary: false
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: >
    Presiding Officer is a judicial officer equivalent to District Judge.
  source: RDDBFI Act 1993; Constitution of India Arts 226-227; Chhattisgarh HC
    judgment (Chandrahas Sao v. Authorised Officer)

data_quality: partial
data_quality_notes: >
  CG HC SUPERVISORY ROLE RESOLVED (drt_b4). Chhattisgarh High Court at Bilaspur
  exercises Art. 226/227 supervisory jurisdiction over tribunals in Chhattisgarh
  territory, including DRT Jabalpur for CG matters (CaseMine judgment Chandrahas
  Sao v. Authorised Officer). Dual supervisory arrangement: MP HC for MP territory,
  CG HC for Chhattisgarh territory. Standard post-bifurcation arrangement for central
  tribunals straddling reorganised states.

