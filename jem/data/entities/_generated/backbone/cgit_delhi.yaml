id: cgit_delhi
name: Central Government Industrial Tribunal, Delhi
name_hindi: केन्द्र सरकार औद्योगिक अधिकरण, दिल्ली
abbreviation: CGIT Delhi
aliases:
  - CGIT-cum-National Industrial Tribunal Delhi
  - Central Government Industrial Tribunal No. 1 Delhi

type: CentralTribunal
cluster: tribunals_adr
level_of_government: Central

created_year: 1952
abolished_year: null
operational_status: Active

constitutional_basis: null
statutory_basis: >-
  Industrial Disputes Act 1947 s.7A (Central Government Industrial Tribunal) and
  s.7B (National Industrial Tribunal for inter-state or national importance disputes).
  Delhi bench is designated CGIT-cum-NIT for matters of national importance
  referred by Central Government. Currently Industrial Disputes Act replaced by
  Industrial Relations Code 2020 (not yet in force as of June 2026 — notified but
  rules not finalised); 1947 Act remains operative.

appointment:
  nominates: null
  recommends: null
  consulted: []
  formally_appoints: central_government
  criteria_public: true
  tenure: >-
    Presiding Officer: person who is, or has been, a Judge of an HC, or is
    qualified to be a Judge of HC (IDA 1947 s.7A(3)). Tenure: as prescribed by
    Central Government; typically until age 65. Reappointment under conditions
    laid down.
  reappointment_possible: true
  removal_authority: central_government
  removal_requires_parliament: false
  removal_independent_committee: false

funding:
  primary_source: Consolidated_Fund_India
  ministry_responsible: ministry_labour_employment
  budget_figure_crore: null
  budget_year: null

audit:
  audited_by: cag_india
  audit_type: CAG_Statutory
  audit_report_public: null
  conduct_oversight_body: null

complaint_mechanism:
  bias_complaint_to: []
  criminal_prosecution:
    requires_sanction_from: central_government
    consultation_required_with: null
    consultation_binding: null
  removal_mechanism: >-
    Central Government may remove Presiding Officer on grounds of misbehaviour or
    incapacity after inquiry (IDA 1947 s.9). No independent committee requirement.
  lokpal_jurisdiction: 'No'
  lokpal_jurisdiction_note: >-
    Presiding Officer exercises judicial functions under IDA 1947; not a public
    servant for Lokpal purposes in judicial capacity. Analogous to tribunal
    judicial members excluded by convention; confirm against Lokpal Act Schedule
    for final determination.
  source: Industrial Disputes Act 1947 ss.7A, 7B, 9

