  notes: >-
    Each CGIT seat has one Presiding Officer post; allotted = 1 per bench.
    Appointed (working) count not confirmed from official source.

data_quality: partial
data_quality_notes: >-
  Delhi CGIT handles references by Central Government under IDA 1947 s.10 in
  disputes involving Central Government employees or Central sphere industries.
  Also designated NIT for inter-state disputes of national importance (s.7B).
  Physical address: CGIT Building, New Delhi. Cases filed pending Industrial
  Relations Code 2020 enforcement (deferred). Vacancy data not confirmed.

