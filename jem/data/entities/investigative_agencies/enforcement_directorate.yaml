    url: https://enforcementdirectorate.gov.in/
    type: GoIWebsite
    accessed_date: '2026-06-17'
  - label: PMLA 2002 — India Code
    url: https://india-code.nic.in/
    type: CentralAct
    accessed_date: '2026-06-17'
