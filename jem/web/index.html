<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Judiciary Entity Map (India) - JEM</title>
  <link rel="icon" href="public/assets/jem-favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="public/assets/jem-app-icon.svg">
    <link rel="stylesheet" href="/styles-core.css">
<link rel="stylesheet" href="styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style id="jem-boot-critical">
  #jem-boot-screen {
    position: fixed;
    inset: 0;
    z-index: 3000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: #fbfbf8;
    color: #4b5563;
  }
  body.jem-ready #jem-boot-screen { display: none; }
  #jem-boot-screen .jem-boot-wordmark {
    display: block;
    width: min(460px, 78vw);
    height: auto;
  }
  #jem-boot-screen .jem-boot-spinner {
    width: 28px; height: 28px;
    border: 2px solid #e5e7eb;
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: jem-boot-spin 0.75s linear infinite;
  }
  @keyframes jem-boot-spin { to { transform: rotate(360deg); } }
  #jem-boot-screen .jem-boot-tag { font-size: 12px; color: #6b7280; }
  </style>
  <script src="/scripts/adaptive-layout.js" defer></script>
  <script src="/scripts/umami-track.js" defer></script>
</head>
<body class="jem-app blog-page">

<header class="site-header">
  <a class="brand" href="/" aria-label="Friedso home">
    <img src="/assets/friedso-wordmark.png" alt="Friedso">
  </a>
  <nav class="site-works-nav" aria-label="Friedso sections">
    <a href="/apps/">Works</a>
  </nav>
</header>

<div id="jem-boot-screen" role="status" aria-live="polite" aria-busy="true" aria-label="Loading JEM">
  <img src="public/assets/jem-logo.png" class="jem-boot-wordmark" alt="JEM — Judiciary Entity Map (India)" width="460" height="212" decoding="async">
  <div class="jem-boot-spinner" aria-hidden="true"></div>
  <p class="jem-boot-tag">Loading structural map…</p>
</div>

<div id="toolbar">
  <div class="toolbar-primary">
    <div class="toolbar-brand-search">
      <button type="button" id="btn-home" class="app-home-btn app-logo-btn" title="Back to overview" aria-label="JEM — Judiciary Entity Map (India)">
        <img src="public/assets/jem-lockup.png" class="jem-toolbar-logo" alt="" width="160" height="68" decoding="async">
      </button>
      <div id="search-container">
        <input type="text" id="search-input" placeholder="Search entity or ask: HC pendency, largest vacancy…" autocomplete="off" aria-controls="search-results insight-panel" aria-expanded="false">
        <div id="search-results" class="hidden"></div>
      </div>
    </div>

    <div class="toolbar-actions">
      <div id="mode-switcher" class="hidden" role="group" aria-label="View mode">
        <button type="button" class="mode-btn mode-btn-structure active" data-mode="structure" title="Appellate hierarchy only, government level colouring">Structure</button>
        <button type="button" class="mode-btn mode-btn-risk" data-mode="risk" title="Independence risk rings and discretionary power sizing">Risk</button>
        <button type="button" class="mode-btn mode-btn-gaps" data-mode="gaps" title="Structural gaps, exceptions, circularity, broken appellate paths">Gaps</button>
      </div>

      <div id="zoom-controls" class="hidden" aria-hidden="true">
        <button id="btn-zoom-in" title="Zoom in">+</button>
        <button id="btn-zoom-reset" title="Reset view">⌂</button>
        <button id="btn-zoom-out" title="Zoom out">−</button>
        <span id="zoom-level-label">Map</span>
      </div>

      <button id="btn-about" class="btn-ghost" title="About this project">About</button>
      <div id="toolbar-auth" class="toolbar-auth" hidden aria-live="polite"></div>
    </div>
  </div>

  <div id="search-wrap">
    <div id="search-insight-chips" class="search-insight-chips" aria-label="Common structural questions"></div>
    <div id="insight-panel" class="insight-panel hidden" aria-live="polite"></div>
  </div>
</div>

<div id="summary-view" class="summary-view hidden" aria-label="Overview dashboard"></div>
<div id="detail-view" class="detail-view hidden" aria-label="Entity detail"></div>
<div id="about-view" class="about-view hidden" aria-label="About JEM"></div>

<div id="map-load-stage" class="map-load-stage hidden" aria-live="polite">
  <div id="map-load-gate" class="map-load-gate hidden">
    <img src="public/assets/jem-mark.svg" class="map-load-gate-mark jem-mark" alt="" width="48" height="48" decoding="async">
    <h2 class="map-load-gate-title">Interactive map</h2>
    <p class="map-load-gate-copy">Loads ~6&nbsp;MB of graph data and initializes the canvas workspace.</p>
    <button type="button" id="btn-load-map" class="map-load-gate-btn">Load interactive map</button>
    <button type="button" id="btn-map-gate-back" class="btn-ghost map-load-gate-back">Back to overview</button>
  </div>
  <div id="map-load-spinner" class="map-load-spinner-pane hidden">
    <div class="loading-spinner"></div>
    <p class="loading-text">Preparing map…</p>
  </div>
</div>

<script src="public/api-config.js"></script>
<script type="module" src="src/main.js?v=20260630c"></script>

</body>
</html>
